name: 플스 사전,신작 추적Combined Tracker

on:
  schedule:
    - cron: '10 23,1,2,3,4,5,6,7,8,11 * * *'
    - cron: '40 1,2,3,4,5,6,7,8 * * *'
  workflow_dispatch:

permissions:
  contents: write

# cancel-in-progress: false → 이미 실행 중이어도 다음 트리거는 큐에서 대기
concurrency:
  group: rank-history
  cancel-in-progress: false

env:
  # Node.js 24를 지금 바로 opt-in (경고 제거, 6월 강제 전환 전 안전하게 적용)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4.2.2   # Node 24 지원 최신 버전

    - name: Setup Python
      uses: actions/setup-python@v5.4.0   # Node 24 지원 최신 버전
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install selenium webdriver-manager requests matplotlib

    - name: Run Trackers
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        python crimson_tracker.py

    - name: Commit and Push changes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        TRACKED_FILES=(
          rank_history.json
          crimson_discord_baseline.json
        )

        mkdir -p /tmp/tracker_backup
        for f in "${TRACKED_FILES[@]}"; do
          [ -f "$f" ] && cp "$f" "/tmp/tracker_backup/$f"
        done
        echo "✅ 백업 완료"

        for f in "${TRACKED_FILES[@]}"; do
          git checkout -- "$f" 2>/dev/null || true
        done
        git pull origin main --rebase || {
          echo "⚠️ rebase 실패, abort 후 일반 pull 시도"
          git rebase --abort 2>/dev/null || true
          git pull origin main --no-rebase
        }

        for f in "${TRACKED_FILES[@]}"; do
          if [ -f "/tmp/tracker_backup/$f" ]; then
            cp "/tmp/tracker_backup/$f" "$f"
            echo "  복원: $f"
          fi
        done

        for f in "${TRACKED_FILES[@]}"; do
          [ -f "$f" ] && git add "$f" || true
        done

        git diff --cached --quiet && { echo "변경사항 없음, 스킵"; exit 0; }

        git commit -m "Update PS tracker history [skip ci]"

        git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git main || {
          echo "⚠️ push 실패, pull 후 재시도"
          git pull origin main --rebase
          for f in "${TRACKED_FILES[@]}"; do
            [ -f "/tmp/tracker_backup/$f" ] && cp "/tmp/tracker_backup/$f" "$f"
            [ -f "$f" ] && git add "$f" || true
          done
          git commit --amend --no-edit 2>/dev/null || true
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git main
        }

        echo "✅ 완료!"
