name: Steam 동접 추적기

on:
  schedule:
    - cron: '*/5 * * * *'   # 5분마다 실행 (출시 전 카운트다운 + 출시 후 동접 추적)
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install requests

      - name: 히스토리 캐시 복원
        uses: actions/cache@v5
        with:
          path: |
            steam_history_crimsondesert.json
          key: steam-history-${{ github.run_id }}
          restore-keys: |
            steam-history-

      - name: 동접 추적 실행
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python steam_concurrent_tracker.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # 기본 제공
          GH_OWNER: gonmau
          GH_REPO:  PreOrderBlackDesert
          GH_BRANCH: main

      - name: 히스토리 캐시 저장
        uses: actions/cache/save@v5
        if: always()
        with:
          path: |
            steam_history_crimsondesert.json
          key: steam-history-${{ github.run_id }}
