name: Steam 동접 추적기

on:
  schedule:
    - cron: '*/5 * * * *'   # 5분마다 실행 (출시 전 카운트다운 + 출시 후 동접 추적)
  workflow_dispatch:

permissions:
  contents: write   # steam_history_crimsondesert.json 자동 커밋에 필요

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install requests

      - name: 동접 추적 실행
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_OWNER: ${{ github.repository_owner }}
          GH_REPO: ${{ github.event.repository.name }}
          GH_BRANCH: ${{ github.ref_name }}
        run: python steam_concurrent_tracker.py
