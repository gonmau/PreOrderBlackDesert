name: Bestseller Tracker

on:
  schedule:
    - cron: '0 9,21 * * *'   # KST 18:00 / 06:00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bestseller-history
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 셀레니움/드라이버 캐싱으로 속도 향상
    - name: Cache WebDriver
      uses: actions/cache@v4
      with:
        path: ~/.cache/selenium
        key: ${{ runner.os }}-selenium-${{ hashFiles('**/bestseller_tracker.py') }}
        restore-keys: |
          ${{ runner.os }}-selenium-

    - name: Install Dependencies
      run: |
        pip install selenium webdriver-manager requests

    - name: Run Bestseller Tracker
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        python bestseller_tracker.py

    - name: Commit and Push changes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        TRACKED_FILES=(
          bestseller_history.json
        )

        # 1. 크롤링 결과 임시 백업
        mkdir -p /tmp/tracker_backup
        for f in "${TRACKED_FILES[@]}"; do
          [ -f "$f" ] && cp "$f" "/tmp/tracker_backup/$f"
        done

        # 2. 서버 최신 상태로 rebase (데이터 유실 방지)
        git fetch origin main
        git checkout main
        git pull origin main --rebase

        # 3. 결과 복원
        for f in "${TRACKED_FILES[@]}"; do
          if [ -f "/tmp/tracker_backup/$f" ]; then
            cp "/tmp/tracker_backup/$f" "$f"
          fi
        done

        # 4. 변경사항 커밋
        git add bestseller_history.json
        git diff --cached --quiet || (git commit -m "Update history [skip ci]" && git push origin main)
