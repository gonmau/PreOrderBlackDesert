name: 붉사 최종 트레일러 YouTube Tracker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:      # 수동 실행 가능

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install Dependencies
      run: |
        pip install requests matplotlib
    
    - name: Run YouTube Tracker
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: python youtube_tracker.py
    
    - name: Commit and Push changes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        TRACKED_FILES=(
          youtube_history.json
        )

        # 1. 크롤링 결과 임시 백업
        mkdir -p /tmp/tracker_backup
        for f in "${TRACKED_FILES[@]}"; do
          [ -f "$f" ] && cp "$f" "/tmp/tracker_backup/$f"
        done

        # 2. 서버 최신 상태로 rebase
        for f in "${TRACKED_FILES[@]}"; do
          git checkout -- "$f" 2>/dev/null || true
        done
        git pull origin main --rebase || {
          echo "⚠️ rebase 실패, abort 후 일반 pull 시도"
          git rebase --abort 2>/dev/null || true
          git pull origin main --no-rebase
        }

        # 3. 백업본 복원
        for f in "${TRACKED_FILES[@]}"; do
          [ -f "/tmp/tracker_backup/$f" ] && cp "/tmp/tracker_backup/$f" "$f"
        done

        # 4. add → commit → push
        for f in "${TRACKED_FILES[@]}"; do
          [ -f "$f" ] && git add "$f" || true
        done

        git diff --cached --quiet && { echo "변경사항 없음, 스킵"; exit 0; }

        git commit -m "Update youtube history [skip ci]"

        # 5. push 실패 시 재시도 1회
        git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git main || {
          echo "⚠️ push 실패, pull 후 재시도"
          git pull origin main --rebase
          for f in "${TRACKED_FILES[@]}"; do
            [ -f "/tmp/tracker_backup/$f" ] && cp "/tmp/tracker_backup/$f" "$f"
            [ -f "$f" ] && git add "$f" || true
          done
          git commit --amend --no-edit 2>/dev/null || true
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git main
        }

        echo "✅ 완료!"
