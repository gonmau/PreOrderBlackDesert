<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가계부 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2130;
    --border: #2a2d3a;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    --accent: #4f8ef7;
    --accent2: #7c5cf7;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --orange: #fb923c;
    --pink: #f472b6;
    --teal: #2dd4bf;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 상단 설정 바 ── */
  .config-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .config-bar label { font-size: 12px; color: var(--text-muted); }
  .config-bar input, .config-bar select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .config-bar input { width: 280px; }
  .config-bar input::placeholder { color: var(--text-muted); }
  .config-bar input:focus, .config-bar select:focus {
    border-color: var(--accent);
  }
  .btn {
    padding: 7px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3b7de8; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ghost {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── 헤더 ── */
  header {
    padding: 32px 32px 0;
    display: flex;
    align-items: flex-end;
    gap: 16px;
  }
  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  header h1 span { color: var(--accent); }
  .last-updated {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  /* ── 월 선택 탭 ── */
  .month-tabs {
    padding: 24px 32px 0;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .month-tabs::-webkit-scrollbar { display: none; }
  .month-tab {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
  }
  .month-tab:hover { border-color: var(--accent); color: var(--accent); }
  .month-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .month-tab.all {
    background: var(--surface2);
    border-color: var(--border);
    color: var(--text-dim);
  }
  .month-tab.all.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #fff;
  }

  /* ── 메인 레이아웃 ── */
  main {
    padding: 24px 32px 48px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ── KPI 카드 ── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
  }
  .kpi-card:hover { border-color: var(--accent); }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .kpi-card.expense::before { background: var(--red); }
  .kpi-card.income::before { background: var(--green); }
  .kpi-card.balance::before { background: var(--accent); }
  .kpi-card.count::before { background: var(--yellow); }
  .kpi-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .kpi-value {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .kpi-value.expense { color: var(--red); }
  .kpi-value.income { color: var(--green); }
  .kpi-value.balance { color: var(--accent); }
  .kpi-value.count { color: var(--yellow); }
  .kpi-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── 차트 그리드 ── */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .chart-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    width: 3px;
    height: 14px;
    border-radius: 2px;
    background: var(--accent);
    display: inline-block;
  }
  .chart-wrap {
    position: relative;
    height: 240px;
  }
  .chart-wrap.tall { height: 300px; }

  /* ── 월별 수입/지출 바 차트 ── */
  .monthly-chart-wrap {
    height: 260px;
  }

  /* ── 카테고리 리스트 ── */
  .category-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .category-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cat-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cat-name {
    font-size: 13px;
    color: var(--text-dim);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .cat-bar-wrap {
    flex: 2;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .cat-bar {
    height: 100%;
    border-radius: 3px;
    transition: width .6s ease;
  }
  .cat-amount {
    font-size: 12px;
    color: var(--text-muted);
    width: 80px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── 거래 목록 ── */
  .tx-table { width: 100%; border-collapse: collapse; }
  .tx-table th {
    font-size: 11px;
    color: var(--text-muted);
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .tx-table td {
    padding: 10px 12px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,.03);
  }
  .tx-table tr:hover td { background: var(--surface2); }
  .tx-table tr:last-child td { border-bottom: none; }
  .tx-merchant { font-weight: 500; color: var(--text); }
  .tx-date { color: var(--text-muted); font-size: 12px; }
  .tx-amount.출금 { color: var(--red); font-weight: 600; }
  .tx-amount.입금 { color: var(--green); font-weight: 600; }
  .tx-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-지출 { background: rgba(248,113,113,.15); color: var(--red); }
  .badge-수입 { background: rgba(52,211,153,.15); color: var(--green); }

  .payment-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  /* ── 로딩/에러 ── */
  .status-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    gap: 16px;
    color: var(--text-muted);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    background: rgba(248,113,113,.08);
    border: 1px solid rgba(248,113,113,.2);
    border-radius: var(--radius);
    padding: 20px 24px;
    color: var(--red);
    font-size: 14px;
  }

  /* ── 페이지네이션 ── */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
  }
  .page-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    transition: all .15s;
  }
  .page-btn:hover, .page-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,142,247,.1);
  }
  .page-info { font-size: 12px; color: var(--text-muted); }

  /* ── 반응형 ── */
  @media (max-width: 1100px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .chart-grid { grid-template-columns: 1fr; }
    .chart-grid-3 { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 700px) {
    main, header, .config-bar, .month-tabs { padding-left: 16px; padding-right: 16px; }
    .kpi-row { grid-template-columns: 1fr 1fr; }
    .chart-grid-3 { grid-template-columns: 1fr; }
  }

  /* ── 검색 ── */
  .search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .search-bar input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }

  .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }

  .full-width { grid-column: 1 / -1; }

  /* 수입지출 탭 */
  .tx-type-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }
  .tx-type-tab {
    padding: 4px 14px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all .15s;
  }
  .tx-type-tab.active-all { border-color: var(--accent2); color: var(--accent2); background: rgba(124,92,247,.1); }
  .tx-type-tab.active-expense { border-color: var(--red); color: var(--red); background: rgba(248,113,113,.1); }
  .tx-type-tab.active-income { border-color: var(--green); color: var(--green); background: rgba(52,211,153,.1); }
</style>
</head>
<body>

<!-- 설정 바 -->
<div class="config-bar">
  <label>Notion Token</label>
  <input type="password" id="tokenInput" placeholder="ntn_xxxxxxxxxxxxxxxxxxxx" />
  <label>DB ID</label>
  <input type="text" id="dbInput" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" style="width:300px" />
  <button class="btn btn-primary" id="loadBtn" onclick="loadData()">불러오기</button>
  <button class="btn btn-ghost" onclick="clearSaved()">설정 초기화</button>
  <span id="statusMsg" style="font-size:12px;color:var(--text-muted)"></span>
</div>

<!-- 헤더 -->
<header>
  <h1>가계부 <span>대시보드</span></h1>
  <span class="last-updated" id="lastUpdated"></span>
</header>

<!-- 월 탭 -->
<div class="month-tabs" id="monthTabs"></div>

<main id="mainContent">
  <div class="status-box">
    <div style="font-size:40px">💳</div>
    <div>Notion Token과 DB ID를 입력하고 불러오기를 누르세요</div>
  </div>
</main>

<script>
// ── 설정 저장/로드 ──
const LS_TOKEN = 'budget_token';
const LS_DB    = 'budget_db';

window.onload = () => {
  const t = localStorage.getItem(LS_TOKEN);
  const d = localStorage.getItem(LS_DB);
  if (t) document.getElementById('tokenInput').value = t;
  if (d) document.getElementById('dbInput').value = d;
  if (t && d) loadData();
};

function clearSaved() {
  localStorage.removeItem(LS_TOKEN);
  localStorage.removeItem(LS_DB);
  document.getElementById('tokenInput').value = '';
  document.getElementById('dbInput').value = '';
}

// ── 전역 상태 ──
let allTx = [];
let selectedMonth = 'all';
let txPage = 1;
const TX_PER_PAGE = 30;
let txFilter = { search: '', type: 'all', category: '' };
let charts = {};

// ── Notion API 호출 ──
async function notionQuery(token, dbId, startCursor = null) {
  const body = { page_size: 100, sorts: [{ property: '날짜', direction: 'descending' }] };
  if (startCursor) body.start_cursor = startCursor;

  const res = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Notion-Version': '2022-06-28',
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  return res.json();
}

function parsePage(page) {
  const p = page.properties;
  const getStr  = (k) => p[k]?.rich_text?.[0]?.plain_text || p[k]?.title?.[0]?.plain_text || '';
  const getNum  = (k) => p[k]?.number ?? 0;
  const getDate = (k) => p[k]?.date?.start || '';
  const getSel  = (k) => p[k]?.select?.name || '';
  const getFml  = (k) => p[k]?.formula?.string || '';

  return {
    id: page.id,
    날짜: getDate('날짜'),
    가맹점명: getStr('가맹점명') || p['가맹점명']?.title?.[0]?.plain_text || '',
    금액: getNum('금액'),
    수입지출: getSel('수입지출'),
    카테고리: getSel('카테고리'),
    결제수단: getSel('결제수단'),
    월: getFml('월') || getDate('날짜').slice(0, 7),
  };
}

async function loadData() {
  const token = document.getElementById('tokenInput').value.trim();
  const dbId  = document.getElementById('dbInput').value.trim();
  if (!token || !dbId) { alert('Token과 DB ID를 모두 입력하세요.'); return; }

  localStorage.setItem(LS_TOKEN, token);
  localStorage.setItem(LS_DB, dbId);

  const btn = document.getElementById('loadBtn');
  const msg = document.getElementById('statusMsg');
  btn.disabled = true;
  btn.textContent = '로딩 중...';
  msg.textContent = '';

  document.getElementById('mainContent').innerHTML = `
    <div class="status-box"><div class="spinner"></div><div>Notion에서 데이터 불러오는 중...</div></div>`;

  try {
    let results = [];
    let cursor = null;
    let pageCount = 0;
    do {
      const data = await notionQuery(token, dbId, cursor);
      results = results.concat(data.results);
      cursor = data.has_more ? data.next_cursor : null;
      pageCount++;
      msg.textContent = `${results.length}건 로드 중...`;
    } while (cursor);

    allTx = results.map(parsePage).filter(t => t.날짜);
    allTx.sort((a, b) => b.날짜.localeCompare(a.날짜));

    document.getElementById('lastUpdated').textContent =
      `마지막 업데이트: ${new Date().toLocaleString('ko-KR')} · 총 ${allTx.length}건`;

    msg.textContent = `✓ ${allTx.length}건 로드 완료`;
    buildMonthTabs();
    renderAll();
  } catch (e) {
    document.getElementById('mainContent').innerHTML =
      `<div class="error-box">❌ 오류: ${e.message}<br><br>
       Token과 DB ID가 올바른지, Integration이 DB에 연결되어 있는지 확인하세요.</div>`;
    msg.textContent = '오류 발생';
  } finally {
    btn.disabled = false;
    btn.textContent = '불러오기';
  }
}

// ── 월 탭 ──
function buildMonthTabs() {
  const months = [...new Set(allTx.map(t => t.월))].sort().reverse();
  const tabs = document.getElementById('monthTabs');
  tabs.innerHTML = `<button class="month-tab all active" onclick="selectMonth('all')">전체</button>` +
    months.map(m => `<button class="month-tab" onclick="selectMonth('${m}')">${m}</button>`).join('');
}

function selectMonth(m) {
  selectedMonth = m;
  txPage = 1;
  document.querySelectorAll('.month-tab').forEach(t => t.classList.remove('active'));
  const idx = [...document.querySelectorAll('.month-tab')].findIndex(
    t => t.textContent === (m === 'all' ? '전체' : m));
  if (idx >= 0) document.querySelectorAll('.month-tab')[idx].classList.add('active');
  renderAll();
}

function getFiltered() {
  return allTx.filter(t => selectedMonth === 'all' || t.월 === selectedMonth);
}

// ── 색상 팔레트 ──
const CAT_COLORS = {
  '식비': '#f87171', '카페': '#fb923c', '교통': '#60a5fa',
  '쇼핑': '#f472b6', '마트/편의점': '#34d399', '의료': '#a78bfa',
  '문화/여가': '#fbbf24', '구독': '#94a3b8', '이체/송금': '#64748b',
  '기타': '#475569',
};
const CARD_COLORS = ['#4f8ef7','#7c5cf7','#34d399','#fbbf24','#f87171','#f472b6','#2dd4bf','#fb923c'];
function catColor(name) { return CAT_COLORS[name] || '#6b7280'; }

// ── 숫자 포맷 ──
function fmtWon(n) {
  if (n >= 1e8) return `${(n/1e8).toFixed(1)}억`;
  if (n >= 1e4) return `${Math.round(n/1e4)}만`;
  return n.toLocaleString('ko-KR');
}
function fmtWonFull(n) { return n.toLocaleString('ko-KR') + '원'; }

// ── 차트 destroy helper ──
function destroyChart(key) {
  if (charts[key]) { charts[key].destroy(); delete charts[key]; }
}

// ── 전체 렌더 ──
function renderAll() {
  const tx = getFiltered();
  const expense = tx.filter(t => t.수입지출 === '지출');
  const income  = tx.filter(t => t.수입지출 === '수입');
  const totalExp = expense.reduce((s, t) => s + t.금액, 0);
  const totalInc = income.reduce((s, t) => s + t.금액, 0);
  const balance  = totalInc - totalExp;

  document.getElementById('mainContent').innerHTML = `
    <!-- KPI -->
    <div class="kpi-row">
      <div class="kpi-card expense">
        <div class="kpi-label">총 지출</div>
        <div class="kpi-value expense">${fmtWonFull(totalExp)}</div>
        <div class="kpi-sub">${expense.length}건</div>
      </div>
      <div class="kpi-card income">
        <div class="kpi-label">총 수입</div>
        <div class="kpi-value income">${fmtWonFull(totalInc)}</div>
        <div class="kpi-sub">${income.length}건</div>
      </div>
      <div class="kpi-card balance">
        <div class="kpi-label">순수지</div>
        <div class="kpi-value balance" style="color:${balance>=0?'var(--green)':'var(--red)'}">${balance>=0?'+':''}${fmtWonFull(balance)}</div>
        <div class="kpi-sub">${balance >= 0 ? '흑자' : '적자'}</div>
      </div>
      <div class="kpi-card count">
        <div class="kpi-label">총 거래</div>
        <div class="kpi-value count">${tx.length.toLocaleString()}건</div>
        <div class="kpi-sub">${[...new Set(tx.map(t=>t.월))].length}개월</div>
      </div>
    </div>

    <!-- 월별 추이 + 카테고리 파이 -->
    <div class="chart-grid">
      <div class="card">
        <div class="card-title">월별 수입 / 지출</div>
        <div class="chart-wrap monthly-chart-wrap"><canvas id="monthlyChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">카테고리별 지출 비율</div>
        <div class="chart-wrap" style="height:200px"><canvas id="catPieChart"></canvas></div>
        <div id="catLegend" style="margin-top:16px"></div>
      </div>
    </div>

    <!-- 카테고리 막대 + 카드별 -->
    <div class="chart-grid">
      <div class="card">
        <div class="card-title">카테고리별 지출 금액</div>
        <div id="catBarList" class="category-list"></div>
      </div>
      <div class="card">
        <div class="card-title">결제수단별 지출</div>
        <div class="chart-wrap"><canvas id="cardChart"></canvas></div>
      </div>
    </div>

    <!-- 거래 목록 -->
    <div class="card full-width">
      <div class="card-title">거래 목록</div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="가맹점명 검색..." oninput="applyTxFilter()" />
        <select id="catFilter" onchange="applyTxFilter()">
          <option value="">전체 카테고리</option>
          ${[...new Set(allTx.map(t=>t.카테고리))].filter(Boolean).sort()
            .map(c => `<option value="${c}">${c}</option>`).join('')}
        </select>
        <select id="cardFilter" onchange="applyTxFilter()">
          <option value="">전체 결제수단</option>
          ${[...new Set(allTx.map(t=>t.결제수단))].filter(Boolean).sort()
            .map(c => `<option value="${c}">${c}</option>`).join('')}
        </select>
      </div>
      <div class="tx-type-tabs">
        <button class="tx-type-tab active-all" onclick="setTxType('all',this)">전체</button>
        <button class="tx-type-tab" onclick="setTxType('지출',this)">지출만</button>
        <button class="tx-type-tab" onclick="setTxType('수입',this)">수입만</button>
      </div>
      <div id="txTableWrap"></div>
      <div class="pagination" id="txPagination"></div>
    </div>
  `;

  renderMonthlyChart(tx);
  renderCatPie(expense);
  renderCatBar(expense);
  renderCardChart(expense);
  renderTxTable(tx);
}

// ── 월별 바 차트 ──
function renderMonthlyChart(tx) {
  const months = [...new Set(allTx.map(t => t.월))].sort();
  const expData = months.map(m => allTx.filter(t => t.월===m && t.수입지출==='지출').reduce((s,t)=>s+t.금액,0));
  const incData = months.map(m => allTx.filter(t => t.월===m && t.수입지출==='수입').reduce((s,t)=>s+t.금액,0));

  destroyChart('monthly');
  const ctx = document.getElementById('monthlyChart').getContext('2d');
  charts['monthly'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: months,
      datasets: [
        { label: '지출', data: expData, backgroundColor: 'rgba(248,113,113,.7)', borderRadius: 6, borderSkipped: false },
        { label: '수입', data: incData, backgroundColor: 'rgba(52,211,153,.7)', borderRadius: 6, borderSkipped: false },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#9ca3af', font: { size: 12 } } } },
      scales: {
        x: { ticks: { color: '#6b7280', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,.04)' } },
        y: { ticks: { color: '#6b7280', font: { size: 11 }, callback: v => fmtWon(v) }, grid: { color: 'rgba(255,255,255,.06)' } }
      }
    }
  });
}

// ── 카테고리 파이 ──
function renderCatPie(expense) {
  const catMap = {};
  expense.forEach(t => { catMap[t.카테고리||'기타'] = (catMap[t.카테고리||'기타']||0) + t.금액; });
  const sorted = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const labels = sorted.map(([k])=>k);
  const data   = sorted.map(([,v])=>v);
  const colors = labels.map(catColor);

  destroyChart('catPie');
  const ctx = document.getElementById('catPieChart').getContext('2d');
  charts['catPie'] = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0, hoverOffset: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${fmtWonFull(ctx.raw)}` } }
      }
    }
  });

  // 범례
  const total = data.reduce((s,v)=>s+v,0);
  document.getElementById('catLegend').innerHTML = sorted.slice(0,6).map(([name,val]) => `
    <div class="category-item">
      <div class="cat-dot" style="background:${catColor(name)}"></div>
      <div class="cat-name">${name}</div>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${total?val/total*100:0}%;background:${catColor(name)}"></div></div>
      <div class="cat-amount">${fmtWon(val)}</div>
    </div>`).join('');
}

// ── 카테고리 막대 리스트 ──
function renderCatBar(expense) {
  const catMap = {};
  expense.forEach(t => { catMap[t.카테고리||'기타'] = (catMap[t.카테고리||'기타']||0) + t.금액; });
  const sorted = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;
  document.getElementById('catBarList').innerHTML = sorted.map(([name,val]) => `
    <div class="category-item">
      <div class="cat-dot" style="background:${catColor(name)}"></div>
      <div class="cat-name">${name}</div>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${val/max*100}%;background:${catColor(name)}"></div></div>
      <div class="cat-amount">${fmtWonFull(val)}</div>
    </div>`).join('') || '<div class="empty">데이터 없음</div>';
}

// ── 카드별 도넛 ──
function renderCardChart(expense) {
  const cardMap = {};
  expense.forEach(t => { cardMap[t.결제수단||'기타'] = (cardMap[t.결제수단||'기타']||0) + t.금액; });
  const sorted = Object.entries(cardMap).sort((a,b)=>b[1]-a[1]);
  const labels = sorted.map(([k])=>k);
  const data   = sorted.map(([,v])=>v);

  destroyChart('card');
  const ctx = document.getElementById('cardChart').getContext('2d');
  charts['card'] = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: CARD_COLORS.slice(0,labels.length), borderWidth: 0, hoverOffset: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '55%',
      plugins: {
        legend: { position: 'right', labels: { color: '#9ca3af', font: { size: 12 }, padding: 12 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${fmtWonFull(ctx.raw)}` } }
      }
    }
  });
}

// ── 거래 목록 ──
function setTxType(type, btn) {
  txFilter.type = type;
  txPage = 1;
  document.querySelectorAll('.tx-type-tab').forEach(t => {
    t.className = 'tx-type-tab';
  });
  if (type === 'all') btn.classList.add('active-all');
  else if (type === '지출') btn.classList.add('active-expense');
  else btn.classList.add('active-income');
  renderTxTable(getFiltered());
}

function applyTxFilter() {
  txFilter.search   = document.getElementById('searchInput').value.toLowerCase();
  txFilter.category = document.getElementById('catFilter').value;
  txFilter.card     = document.getElementById('cardFilter').value;
  txPage = 1;
  renderTxTable(getFiltered());
}

function renderTxTable(tx) {
  let filtered = tx;
  if (txFilter.type !== 'all') filtered = filtered.filter(t => t.수입지출 === txFilter.type);
  if (txFilter.search) filtered = filtered.filter(t => t.가맹점명.toLowerCase().includes(txFilter.search));
  if (txFilter.category) filtered = filtered.filter(t => t.카테고리 === txFilter.category);
  if (txFilter.card) filtered = filtered.filter(t => t.결제수단 === txFilter.card);

  const total = filtered.length;
  const pages = Math.ceil(total / TX_PER_PAGE) || 1;
  if (txPage > pages) txPage = pages;
  const slice = filtered.slice((txPage-1)*TX_PER_PAGE, txPage*TX_PER_PAGE);

  const wrap = document.getElementById('txTableWrap');
  if (!wrap) return;

  if (!slice.length) {
    wrap.innerHTML = '<div class="empty">거래 내역이 없습니다</div>';
  } else {
    wrap.innerHTML = `
      <table class="tx-table">
        <thead><tr>
          <th>날짜</th><th>가맹점명</th><th>카테고리</th><th>결제수단</th><th>구분</th><th style="text-align:right">금액</th>
        </tr></thead>
        <tbody>
        ${slice.map(t => `
          <tr>
            <td class="tx-date">${t.날짜}</td>
            <td class="tx-merchant">${t.가맹점명}</td>
            <td><span class="tx-badge" style="background:${catColor(t.카테고리||'기타')}22;color:${catColor(t.카테고리||'기타')}">${t.카테고리||'기타'}</span></td>
            <td><span class="payment-badge">${t.결제수단||'-'}</span></td>
            <td><span class="tx-badge badge-${t.수입지출}">${t.수입지출}</span></td>
            <td style="text-align:right" class="tx-amount ${t.수입지출==='지출'?'출금':'입금'}">${t.수입지출==='지출'?'-':'+'} ${fmtWonFull(t.금액)}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  // 페이지네이션
  const pg = document.getElementById('txPagination');
  if (!pg) return;
  if (pages <= 1) { pg.innerHTML = `<span class="page-info">총 ${total}건</span>`; return; }
  let btns = `<span class="page-info">${total}건 중 ${(txPage-1)*TX_PER_PAGE+1}–${Math.min(txPage*TX_PER_PAGE,total)}</span>`;
  btns += `<button class="page-btn" onclick="goPage(${txPage-1})" ${txPage===1?'disabled':''}>‹</button>`;
  const start = Math.max(1, txPage-2), end = Math.min(pages, txPage+2);
  for (let i=start; i<=end; i++) btns += `<button class="page-btn ${i===txPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  btns += `<button class="page-btn" onclick="goPage(${txPage+1})" ${txPage===pages?'disabled':''}>›</button>`;
  pg.innerHTML = btns;
}

function goPage(p) {
  txPage = p;
  renderTxTable(getFiltered());
  document.querySelector('.card.full-width')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
