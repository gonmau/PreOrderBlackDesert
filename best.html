<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crimson Desert — Global Heatmap & Trend</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap');

  :root {
    --blood: #ff4757; --gold: #f1c40f; --dark: #000000; --panel: #111111;
    --border: #333333; --text-main: #ffffff; --text-sub: #aaaaaa;
    --up: #2ecc71; --down: #ff4757;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text-main); font-family: 'Rajdhani', 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', 'Twemoji Mozilla', sans-serif; }
  .flag, .top10-item .n, .country-link .flag { font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', 'Twemoji Mozilla', sans-serif; font-style: normal; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

  header { border-bottom: 2px solid var(--blood); padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: flex-end; }
  .logo h1 { font-family: 'Cinzel', serif; font-size: 32px; color: #fff; }
  .logo h1 span { color: var(--blood); }
  #update-time { font-size: 14px; color: var(--gold); font-weight: 700; }

  /* Summary Grid */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 25px; }
  .card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 10px; border-left: 4px solid var(--blood); }
  .card .lbl { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; font-weight: 800; }
  .card .val { font-family: 'Cinzel', serif; font-size: 28px; color: var(--gold); }
  .card .sub { font-size: 14px; margin-top: 5px; color: #fff; }

  /* Top 10 Highlight Area */
  .top10-section { background: #0a0a0a; border: 1px solid var(--border); padding: 20px; border-radius: 10px; margin-bottom: 25px; }
  .top10-title { font-size: 16px; color: var(--gold); font-weight: 800; margin-bottom: 15px; text-transform: uppercase; }
  .top10-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
  .top10-item { background: #1a1a1a; padding: 10px; border-radius: 5px; text-align: center; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
  .top10-item:hover { border-color: var(--gold); background: #222; }
  .top10-item .n { font-size: 13px; color: var(--text-sub); display: block; }
  .top10-item .r { font-size: 18px; font-weight: 700; color: #fff; }

  /* Chart & Table */
  .chart-section { background: #080808; border: 1px solid var(--border); padding: 20px; margin-bottom: 25px; border-radius: 10px; height: 350px; }
  .table-wrapper { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  th { background: #1a1a1a; padding: 15px; text-align: left; font-size: 13px; color: var(--gold); border-bottom: 1px solid var(--border); cursor: pointer; }
  td { padding: 12px 15px; border-bottom: 1px solid #222; font-size: 16px; }

  /* 링크 스타일 */
  .country-link { color: inherit; text-decoration: none; display: flex; align-items: center; }
  .country-link:hover { color: var(--gold); text-decoration: underline; }

  /* Modal (Pop-up Chart) */
  .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
  .modal-content { background: #111; width: 90%; max-width: 800px; padding: 30px; border-radius: 15px; border: 1px solid var(--gold); position: relative; }
  .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; color: #fff; cursor: pointer; }

  .rank-box { font-family: 'Cinzel', serif; font-weight: 900; display: inline-block; width: 60px; text-align: center; border-radius: 4px; padding: 4px 0; cursor: pointer; }
  .flag { font-size: 20px; margin-right: 8px; vertical-align: middle; font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif; }
  /* Twemoji img 태그 크기 통일 */
  img.emoji { height: 1.3em; width: 1.3em; vertical-align: -0.2em; margin-right: 6px; display: inline-block; }
  .top10-item img.emoji { height: 1.1em; width: 1.1em; margin-right: 3px; }
  .trend-up   { color: #2ecc71; font-weight: 700; letter-spacing: 2px; }
  .trend-down { color: #ff4757; font-weight: 700; letter-spacing: 2px; }
  .trend-arrow { margin-right: 4px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo"><h1><span>CRIMSON</span> DESERT</h1></div>
    <div id="update-time">—</div>
  </header>

  <div class="stats">
    <div class="card"><div class="lbl">Weighted Average</div><div class="val" id="stat-avg">—</div></div>
    <div class="card">
      <div class="lbl">Best Rank</div>
      <div class="val" id="stat-best-val">—</div>
      <div class="sub" id="stat-best-name">...</div>
    </div>
    <div class="card">
      <div class="lbl">Worst Rank</div>
      <div class="val" id="stat-worst-val">—</div>
      <div class="sub" id="stat-worst-name">...</div>
    </div>
    <div class="card"><div class="lbl">Active Countries</div><div class="val" id="stat-count">—</div></div>
  </div>

  <div class="top10-section">
    <div class="top10-title">Market Leaders (Top 10 Weight) - Click for History</div>
    <div class="top10-grid" id="top10-grid"></div>
  </div>

  <div class="chart-section"><canvas id="mainChart"></canvas></div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th onclick="setSort('name')">Country (PS Store Link)</th>
          <th onclick="setSort('rank')">Current Rank</th>
          <th onclick="setSort('change')">Trend</th>
          <th onclick="setSort('weight')">Weight ↓</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<div id="chartModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <h2 id="modalTitle" style="margin-bottom:20px; font-family:'Cinzel'; color:var(--gold);">Country Trend</h2>
    <div style="height:400px;"><canvas id="countryChart"></canvas></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@twemoji/api@15.1.0/dist/twemoji.min.js" crossorigin="anonymous"></script>

<script>
/** 파이썬 코드 기반 URL 및 가중치 동기화 **/
// PS Store 공식 로케일 코드
// 출처: psdevwiki.com/ps4/Regioning + gist.github.com/DartPower (실제 PS Store URL 검증)
const COUNTRY_LOCALE = {
  // ── Americas ──────────────────────────────
  "미국":           "en-us",
  "캐나다":         "en-ca",
  "브라질":         "pt-br",
  "멕시코":         "es-mx",
  "아르헨티나":     "es-ar",
  "칠레":           "es-cl",
  "콜롬비아":       "es-co",
  "페루":           "es-pe",
  "우루과이":       "es-uy",
  "볼리비아":       "es-bo",
  "과테말라":       "es-gt",
  "온두라스":       "es-hn",
  "코스타리카":     "es-cr",
  "에콰도르":       "es-ec",
  "엘살바도르":           "es-sv",
  "니카라과":       "es-ni",
  "파나마":         "es-pa",
  "파라과이":       "es-py",
  // ── Europe ────────────────────────────────
  "영국":           "en-gb",
  "독일":           "de-de",
  "프랑스":         "fr-fr",
  "스페인":         "es-es",
  "이탈리아":       "it-it",
  "네덜란드":       "nl-nl",
  "폴란드":         "pl-pl",
  "스위스":         "de-ch",
  "스웨덴":         "sv-se",
  "노르웨이":       "no-no",
  "덴마크":         "en-dk",  // 공식: en-dk (da-dk 아님)
  "핀란드":         "fi-fi",
  "포르투갈":       "pt-pt",
  "그리스":         "en-gr",
  "체코":           "en-cz",
  "헝가리":         "en-hu",
  "루마니아":       "en-ro",
  "슬로바키아":     "en-sk",
  "슬로베니아":     "en-si",
  "우크라이나":     "ru-ua",  // 공식: ru-ua (uk-ua 아님)
  "벨기에":         "nl-be",
  "오스트리아":     "de-at",
  "아이슬란드":     "en-is",
  "아일랜드":       "en-ie",
  "룩셈부르크":     "de-lu",  // 공식: de-lu (fr-lu 아님)
  "몰타":           "en-mt",
  "크로아티아":     "en-hr",
  "불가리아":       "en-bg",
  "키프로스":       "en-cy",
  "터키":           "en-tr",
  // ── Middle East & Africa ──────────────────
  "사우디아라비아": "en-sa",
  "아랍에미리트":   "en-ae",
  "남아공":         "en-za",
  "이스라엘":       "en-il",
  "쿠웨이트":       "en-kw",
  "레바논":         "en-lb",
  "오만":           "en-om",
  "카타르":         "en-qa",
  "바레인":         "en-bh",
  // ── Asia & Oceania ────────────────────────
  "일본":           "ja-jp",
  "한국":           "ko-kr",
  "호주":           "en-au",
  "뉴질랜드":       "en-nz",
  "인도":           "en-in",
  "태국":           "en-th",
  "싱가포르":       "en-sg",
  "말레이시아":     "en-my",
  "인도네시아":     "en-id",
  "필리핀":         "en-ph",
  "베트남":         "en-vn",
  "홍콩":           "en-hk",  // 공식: en-hk (zh-hant-hk 아님)
  "대만":           "zh-hant-tw",
};
const WEIGHTS = {"미국":30.0,"영국":8.5,"일본":8.0,"독일":6.5,"프랑스":6.0,"캐나다":4.5,"스페인":4.0,"이탈리아":3.5,"호주":3.0,"한국":2.8};
const FLAGS = {
  "미국":"🇺🇸","캐나다":"🇨🇦","브라질":"🇧🇷","멕시코":"🇲🇽",
  "아르헨티나":"🇦🇷","칠레":"🇨🇱","콜롬비아":"🇨🇴","페루":"🇵🇪",
  "우루과이":"🇺🇾","볼리비아":"🇧🇴","과테말라":"🇬🇹","온두라스":"🇭🇳",
  "코스타리카":"🇨🇷","에콰도르":"🇪🇨","엘살바도르":"🇸🇻",
  "니카라과":"🇳🇮","파나마":"🇵🇦","파라과이":"🇵🇾",
  "영국":"🇬🇧","독일":"🇩🇪","프랑스":"🇫🇷","스페인":"🇪🇸",
  "이탈리아":"🇮🇹","네덜란드":"🇳🇱","폴란드":"🇵🇱","스위스":"🇨🇭",
  "스웨덴":"🇸🇪","노르웨이":"🇳🇴","덴마크":"🇩🇰","핀란드":"🇫🇮",
  "포르투갈":"🇵🇹","그리스":"🇬🇷","체코":"🇨🇿","헝가리":"🇭🇺",
  "루마니아":"🇷🇴","슬로바키아":"🇸🇰","슬로베니아":"🇸🇮",
  "우크라이나":"🇺🇦","사우디아라비아":"🇸🇦","아랍에미리트":"🇦🇪",
  "남아공":"🇿🇦","터키":"🇹🇷","벨기에":"🇧🇪","오스트리아":"🇦🇹",
  "이스라엘":"🇮🇱","크로아티아":"🇭🇷","불가리아":"🇧🇬",
  "키프로스":"🇨🇾","아이슬란드":"🇮🇸","아일랜드":"🇮🇪",
  "쿠웨이트":"🇰🇼","레바논":"🇱🇧","룩셈부르크":"🇱🇺",
  "몰타":"🇲🇹","오만":"🇴🇲","카타르":"🇶🇦","바레인":"🇧🇭",
  "일본":"🇯🇵","한국":"🇰🇷","중국":"🇨🇳","호주":"🇦🇺",
  "인도":"🇮🇳","태국":"🇹🇭","싱가포르":"🇸🇬","말레이시아":"🇲🇾",
  "인도네시아":"🇮🇩","필리핀":"🇵🇭","베트남":"🇻🇳",
  "홍콩":"🇭🇰","대만":"🇹🇼","뉴질랜드":"🇳🇿"
};

let historyData = [];
// 기본 정렬을 가중치(weight) 기준으로, 내림차순(false) 설정
let sortKey = 'weight'; let sortAsc = false; 
let mainChart = null; let countryChart = null;

async function init() {
  const res = await fetch('./bestseller_history.json?t=' + Date.now());
  historyData = await res.json();
  render();
}

function getRank(entry, country) {
  const r = entry.raw_results[country];
  if (r === undefined || r === null) return 999;
  return (typeof r === 'object') ? Math.min(...Object.values(r).filter(v => v !== null)) : r;
}

function getStoreUrl(name) {
  const locale = COUNTRY_LOCALE[name];
  if (!locale) return "https://store.playstation.com/";
  return `https://store.playstation.com/${locale}/pages/browse/1?conceptId=10002363`;
}

function render() {
  const curr = historyData[historyData.length - 1];
  const prev = historyData.length > 1 ? historyData[historyData.length - 2] : null;

  document.getElementById('update-time').innerText = `LAST SNAPSHOT: ${curr.timestamp.split('.')[0].replace('T', ' ')}`;
  document.getElementById('stat-avg').innerText = curr.averages.combined.toFixed(1) + '위';

  let list = [];
  let best = { r: 999, n: '' }; let worst = { r: 0, n: '' };

  Object.keys(curr.raw_results).forEach(name => {
    const r = getRank(curr, name);
    const p = prev ? getRank(prev, name) : 999;
    if (r !== 999) {
      if (r < best.r) best = { r, n: name };
      if (r > worst.r && r < 999) worst = { r, n: name };
    }
    list.push({ name, rank: r, change: (p === 999 || r === 999) ? 0 : p - r, weight: WEIGHTS[name] || 1.0 });
  });

  document.getElementById('stat-best-val').innerText = best.r + '위';
  document.getElementById('stat-best-name').innerText = (FLAGS[best.n] || '') + ' ' + best.n;
  document.getElementById('stat-worst-val').innerText = worst.r === 0 ? '—' : worst.r + '위';
  document.getElementById('stat-worst-name').innerText = worst.n ? (FLAGS[worst.n] || '') + ' ' + worst.n : '...';
  document.getElementById('stat-count').innerText = list.filter(x => x.rank < 999).length + '개국';

  const t10Grid = document.getElementById('top10-grid');
  t10Grid.innerHTML = '';
  Object.keys(WEIGHTS).forEach(name => {
    const r = getRank(curr, name);
    const div = document.createElement('div');
    div.className = 'top10-item';
    div.onclick = () => showCountryChart(name);
    div.innerHTML = `<span class="n">${FLAGS[name] || ''} ${name}</span><span class="r">${r === 999 ? '—' : r + '위'}</span>`;
    t10Grid.appendChild(div);
  });

  // 정렬 로직
  list.sort((a, b) => sortAsc ? (a[sortKey] > b[sortKey] ? 1 : -1) : (a[sortKey] < b[sortKey] ? 1 : -1));
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  list.forEach(d => {
    const tr = document.createElement('tr');
    const opacity = d.rank >= 999 ? 0 : Math.max(0.2, 1 - (d.rank / 120));
    tr.innerHTML = `
      <td>
        <a href="${getStoreUrl(d.name)}" target="_blank" class="country-link">
          <span class="flag">${FLAGS[d.name] || '🏳️'}</span>${d.name} 🔗
        </a>
      </td>
      <td>
        <span class="rank-box" style="background:rgba(255,71,87,${opacity}); color:#fff" onclick="showCountryChart('${d.name}')">
          ${d.rank === 999 ? '—' : d.rank + '위'}
        </span>
      </td>
      <td class="${d.change > 0 ? 'trend-up' : (d.change < 0 ? 'trend-down' : '')}">${d.change > 0 ? '<span class="trend-arrow">▲</span>' + d.change : (d.change < 0 ? '<span class="trend-arrow">▼</span>' + Math.abs(d.change) : '—')}</td>
      <td style="color:var(--gold); font-weight:bold;">${d.weight}</td>
    `;
    tbody.appendChild(tr);
  });

  renderMainChart();

  // 모든 이모지를 Twemoji 이미지로 변환 (PC/모바일 크로스 플랫폼)
  twemoji.parse(document.body, { folder: 'svg', ext: '.svg' });
}

function renderMainChart() {
  const ctx = document.getElementById('mainChart').getContext('2d');
  if (mainChart) mainChart.destroy();
  mainChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        label: 'Global Weighted Avg',
        data: historyData.map(h => ({ x: new Date(h.timestamp.split('.')[0]), y: h.averages.combined })),
        borderColor: '#f1c40f', borderWidth: 4, pointRadius: 4, tension: 0.2, fill: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: {
          type: 'time',
          time: {
            tooltipFormat: 'MM/dd HH:mm',
            displayFormats: { hour: 'MM/dd HH:mm', day: 'MM/dd' }
          },
          grid: { color: '#222' },
          ticks: {
            color: '#fff',
            maxRotation: 45,
            autoSkip: true,
            maxTicksLimit: 12
          }
        },
        y: { reverse: true, grid: { color: '#222' }, ticks: { color: '#fff' } }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function showCountryChart(countryName) {
  document.getElementById('chartModal').style.display = 'flex';
  document.getElementById('modalTitle').innerText = `${FLAGS[countryName] || ''} ${countryName} History`;
  twemoji.parse(document.getElementById('modalTitle'), { folder: 'svg', ext: '.svg' });
  const ctx = document.getElementById('countryChart').getContext('2d');
  if (countryChart) countryChart.destroy();
  const countryData = historyData.map(h => ({ x: new Date(h.timestamp.split('.')[0]), y: getRank(h, countryName) })).filter(d => d.y !== 999);
  countryChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        label: countryName,
        data: countryData,
        borderColor: '#ff4757', borderWidth: 4, pointRadius: 5, tension: 0.2, fill: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: {
          type: 'time',
          time: {
            tooltipFormat: 'MM/dd HH:mm',
            displayFormats: { hour: 'MM/dd HH:mm', day: 'MM/dd' }
          },
          grid: { color: '#333' },
          ticks: { color: '#fff', maxRotation: 45, autoSkip: true, maxTicksLimit: 10 }
        },
        y: { reverse: true, min: 1, grid: { color: '#333' }, ticks: { color: '#fff' } }
      }
    }
  });
}

function closeModal() { document.getElementById('chartModal').style.display = 'none'; }
function setSort(key) { if (sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = (key === 'weight' ? false : true); } render(); }

init();
</script>
</body>
</html>
