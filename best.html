<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crimson Desert — Global Heatmap & Trend</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap');

  /* ══ 디자인 토큰 ══════════════════════════════════════════════ */
  :root {
    /* 브랜드 */
    --blood:  #ff4757;
    --gold:   #f1c40f;
    --steam:  #4a9eff;
    /* 상태 */
    --up:     #2ecc71;
    --down:   #e74c3c;
    /* 배경 레벨 (어두울수록 낮은 숫자) */
    --bg-0:   #000000;
    --bg-1:   #0a0a0a;
    --bg-2:   #111111;
    --bg-3:   #181818;
    --bg-4:   #222222;
    /* 테두리 */
    --bd:     #252525;
    --bd-hi:  #333333;
    /* 텍스트 */
    --tx-1:   #ffffff;
    --tx-2:   #cccccc;
    --tx-3:   #888888;
    --tx-4:   #555555;
    /* 공통 */
    --radius: 8px;
    --gap:    12px;
    --trans:  0.15s ease;
    /* 하위 호환 */
    --dark: var(--bg-0); --panel: var(--bg-2); --border: var(--bd-hi);
    --text-main: var(--tx-1); --text-sub: var(--tx-3); --muted: var(--tx-3);
    --text: var(--tx-1); --surface: var(--bg-2); --surface2: var(--bg-4);
  }

  /* (기존 모든 스타일은 그대로 유지 — 아래에 Top5 차트 관련 추가 스타일만 보강) */
  .chart-section {
    background: var(--bg-1); border: 1px solid var(--bd);
    padding: 16px; border-radius: var(--radius);
    height: 340px; margin-bottom: var(--gap);
  }
  @media (max-width: 600px) { .chart-section { height: 220px; } }

  /* Top5 전용 차트 컨테이너 (기존 스타일과 완벽 일치) */
  .top5-trend-box {
    background: var(--bg-1);
    border: 1px solid var(--bd);
    border-top: 2px solid var(--blood); /* PS용 */
    border-radius: var(--radius);
  }
  .steam-top5-trend-box {
    border-top: 2px solid var(--steam);
  }
  .top5-trend-header {
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--bd);
  }
</style>
</head>
<body>

<header>
  <!-- (기존 header 그대로 유지) -->
  <div class="container" style="display:flex;justify-content:space-between;align-items:center;padding-top:0;padding-bottom:0;max-width:1400px">
    <div class="logo"><h1><span>CRIMSON</span> DESERT</h1></div>
    <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">
      <!-- GitHub Actions 수동 실행 버튼 -->
      <div class="gh-dispatch-wrap">
        <button class="gh-dispatch-btn ps" id="btn-dispatch-ps" onclick="dispatchWorkflow('ps')" title="PS Store 트래커 즉시 실행">
          <span class="btn-icon">▶</span> PS 실행
        </button>
        <button class="gh-dispatch-btn steam" id="btn-dispatch-steam" onclick="dispatchWorkflow('steam')" title="Steam 트래커 즉시 실행">
          <span class="btn-icon">▶</span> Steam 실행
        </button>
        <button class="gh-token-btn" id="btn-refresh-data" onclick="refreshData()" title="데이터 새로고침">🔄</button>
        <button class="gh-token-btn" onclick="openGhModal()" id="gh-token-status" title="GitHub 설정">⚙</button>
      </div>
      <!-- 펄어비스 주가 -->
      <div id="pa-stock" style="display:flex;align-items:center;gap:8px;background:var(--bg-2);border:1px solid var(--bd);border-radius:var(--radius);padding:6px 14px;cursor:pointer" onclick="fetchStock()" title="클릭하여 새로고침">
        <span style="font-size:11px;color:#aaa;letter-spacing:1px;font-weight:700">263750</span>
        <span id="pa-price" style="font-family:'Cinzel',serif;font-size:18px;color:#f1c40f">—</span>
        <span id="pa-change" style="font-size:12px;font-weight:700">—</span>
        <span style="font-size:10px;color:#555">KRX</span>
      </div>
      <div id="update-time">—</div>
    </div>
  </div>
</header>

<div class="nav-bar" id="nav-bar">
  <!-- (기존 nav-bar 그대로 유지) -->
  <div class="nav-group">
    <span class="nav-tab dual-tab active" data-section="sec-summary"    onclick="switchTab(this)">📊 요약</span>
    <span class="nav-tab dual-tab"        data-section="sec-leaderboard" onclick="switchTab(this)">🏆 리더보드</span>
    <span class="nav-tab dual-tab"        data-section="sec-sched"       onclick="switchTab(this)">⏱ 스케줄</span>
    <span class="nav-tab dual-tab"        data-section="sec-sales"       onclick="switchTab(this)">💰 판매량</span>
    <span class="nav-tab dual-tab"        data-section="sec-heatmap"     onclick="switchTab(this)">🔥 히트맵</span>
    <span class="nav-tab dual-tab"        data-section="sec-table"       onclick="switchTab(this)">🌍 국가별</span>
  </div>
</div>

<div class="container" style="padding-top:20px">

  <!-- (기존 GitHub Token 모달 그대로 유지) -->

  <!-- 탭 섹션: 통합 듀얼 패널 -->

  <!-- ① 요약 -->
  <div id="sec-summary" class="tab-section active-section">
    <div class="dual-wrap">
      <!-- PS 좌측 / Steam 우측 stats 카드 (기존 그대로) -->
      <!-- ... (전체 dual-wrap 내용 그대로 유지) ... -->
    </div>

    <!-- 요약 하단 차트 (기존 그대로) -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px">
      <!-- PS 차트 -->
      <div style="background:var(--bg-1);border:1px solid var(--bd);border-top:2px solid var(--blood);border-radius:var(--radius)">
        <div style="padding:8px 14px;font-size:13px;font-weight:800;color:var(--blood);letter-spacing:1px;border-bottom:1px solid var(--bd)">📈 PS Store 추이</div>
        <div style="padding:14px">
          <div style="width:100%;overflow:hidden"><canvas id="summaryPsChart" style="display:block"></canvas></div>
          <div class="chart-legend" style="margin-top:8px">
            <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#fff"></span><span id="sps-leg-start">시작 —</span></div>
            <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#2ecc71"></span><span id="sps-leg-best">최고 —</span></div>
            <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#f1c40f"></span><span id="sps-leg-current">현재 —</span></div>
          </div>
        </div>
        <div style="padding:0 14px 14px;border-top:1px solid var(--bd)">
          <div style="font-size:10px;color:var(--tx-4);font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:10px 0 6px">일자별 순위별 국가수</div>
          <div style="width:100%;overflow:hidden"><canvas id="psRankDistChart" style="display:block"></canvas></div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;font-size:11px">
            <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#f1c40f;border-radius:2px;display:inline-block"></span>1위</span>
            <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#c0c0c0;border-radius:2px;display:inline-block"></span>2~3위</span>
            <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#4a9eff;border-radius:2px;display:inline-block"></span>4~10위</span>
            <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#555;border-radius:2px;display:inline-block"></span>11위+</span>
          </div>
        </div>
      </div>
      <!-- Steam 차트 -->
      <div style="background:var(--bg-1);border:1px solid var(--bd);border-top:2px solid var(--steam);border-radius:var(--radius)">
        <div style="padding:8px 14px;font-size:13px;font-weight:800;color:var(--steam);letter-spacing:1px;border-bottom:1px solid var(--bd)">📈 Steam 추이</div>
        <div style="padding:14px">
          <div style="width:100%;overflow:hidden"><canvas id="summaryStChart" style="display:block"></canvas></div>
          <div class="chart-legend" style="margin-top:8px">
            <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#fff"></span><span id="sst-leg-start">시작 —</span></div>
            <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#2ecc71"></span><span id="sst-leg-best">최고 —</span></div>
            <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#f1c40f"></span><span id="sst-leg-current">현재 —</span></div>
            <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#e74c3c"></span><span id="sst-leg-worst">최저 —</span></div>
          </div>
        </div>
        <div style="padding:0 14px 14px;border-top:1px solid var(--bd)">
          <div style="font-size:10px;color:var(--tx-4);font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:10px 0 6px">일자별 순위별 국가수</div>
          <div style="width:100%;overflow:hidden"><canvas id="stsRankDistChart" style="display:block"></canvas></div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;font-size:11px">
            <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#f1c40f;border-radius:2px;display:inline-block"></span>1위</span>
            <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#c0c0c0;border-radius:2px;display:inline-block"></span>2~3위</span>
            <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#4a9eff;border-radius:2px;display:inline-block"></span>4~10위</span>
            <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#555;border-radius:2px;display:inline-block"></span>11위+</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ────────────────────────────────────────────────────────────────
         ★ 새로 추가: 각 플랫폼 Top5 시장점유율 국가 일별 순위 변화 그래프
         (기존 요약 하단 차트 바로 아래에 동일한 1fr 1fr 그리드 형태로 배치)
         큰 틀(dual-wrap + 요약 차트 그리드) 완전 유지
         ──────────────────────────────────────────────────────────────── -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px">
      <!-- PS Top5 -->
      <div class="top5-trend-box">
        <div class="top5-trend-header" style="color:var(--blood)">📈 PS Store Top5 시장점유율 국가 순위 추이</div>
        <div style="padding:14px">
          <div style="width:100%;overflow:hidden;height:320px"><canvas id="psTop5TrendChart" style="display:block"></canvas></div>
        </div>
      </div>

      <!-- Steam Top5 -->
      <div class="top5-trend-box steam-top5-trend-box">
        <div class="top5-trend-header" style="color:var(--steam)">📈 Steam Top5 시장점유율 국가 순위 추이</div>
        <div style="padding:14px">
          <div style="width:100%;overflow:hidden;height:320px"><canvas id="steamTop5TrendChart" style="display:block"></canvas></div>
        </div>
      </div>
    </div>
  </div><!-- /sec-summary -->

  <!-- (나머지 모든 탭 섹션 — 리더보드, 스케줄, 판매량, 히트맵, 국가별 — 그대로 유지) -->
  <!-- ... (기존 코드의 모든 나머지 내용 그대로) ... -->

</div><!-- /container -->

<!-- (기존 모든 모달, 스크립트 src 그대로 유지) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@twemoji/api@15.1.0/dist/twemoji.min.js" crossorigin="anonymous"></script>

<script>
/** 기존 모든 상수/함수 그대로 유지 (COUNTRY_LOCALE, WEIGHTS, FLAGS, STS_W, STS_F 등) */
const COUNTRY_LOCALE = { /* 기존 그대로 */ };
const WEIGHTS = { /* 기존 그대로 */ };
const FLAGS = { /* 기존 그대로 */ };

const PS_MARKET_TOP5    = new Set(['미국', '일본', '독일', '영국', '프랑스']);
const STEAM_MARKET_TOP5 = new Set(['미국', '러시아', '독일', '영국', '중국']);

/* ★ 새로 추가: Top5 배열 (순서 보장 + 차트용) */
const PS_TOP5 = ['미국', '일본', '독일', '영국', '프랑스'];
const STEAM_TOP5 = ['미국', '러시아', '독일', '영국', '중국'];

/* 기존 차트 변수들 */
let historyData = [];
let scheduleSlots = [];
let sortKey = 'rank'; let sortAsc = true; 
let mainChart = null; let countryChart = null;
let summaryPsCI = null, summaryStCI = null;
let psDistCI = null; let stsDistCI = null; /* 기존 분포 차트 변수들 */

/* ★ 새로 추가: Top5 Trend 차트 인스턴스 */
let psTop5TrendCI = null;
let steamTop5TrendCI = null;

/* (기존 모든 함수 — loadPsData, init, render, renderSummaryCharts 등 그대로 유지) */

/* ── 기존 renderSummaryCharts 함수에 Top5 차트 렌더 호출 추가 ── */
function renderSummaryCharts() {
  /* 기존 PS / Steam 추이 + 분포 차트 코드 (전체 그대로 유지) */
  /* ... (기존 renderSummaryCharts 내부 전체 코드) ... */

  /* ★ 끝에 Top5 차트 렌더링 추가 */
  renderTop5TrendCharts();
}

/* ★ 새로 추가: Top5 시장점유율 국가 일별 순위 변화 그래프 렌더 함수 */
function renderTop5TrendCharts() {
  /* ── PS Top5 ───────────────────────────────────────────────────── */
  const psCanvas = document.getElementById('psTop5TrendChart');
  if (psCanvas && historyData.length > 1) {
    psCanvas.width = psCanvas.parentElement.offsetWidth || 800;
    psCanvas.height = 320;

    const labels = historyData.map(h => new Date(h.timestamp.split('.')[0]));
    const colors = ['#ff4757', '#f1c40f', '#2ecc71', '#3498db', '#9b59b6'];

    const datasets = PS_TOP5.map((country, idx) => {
      const data = historyData.map(h => {
        const r = getRank(h, country);
        return r < 999 ? r : null;
      });
      return {
        label: `${FLAGS[country] || ''} ${country}`,
        data: data,
        borderColor: colors[idx],
        backgroundColor: 'rgba(255,255,255,0.06)',
        borderWidth: 2.5,
        tension: 0.25,
        spanGaps: true,
        pointRadius: 0,
        pointHoverRadius: 5
      };
    });

    if (psTop5TrendCI) psTop5TrendCI.destroy();
    psTop5TrendCI = new Chart(psCanvas.getContext('2d'), {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: false,
        animation: false,
        layout: { padding: { top: 10, right: 20 } },
        scales: {
          x: { type: 'time', time: { displayFormats: { day: 'M/d' } }, ticks: { color: '#aaa', maxTicksLimit: 10, font: { size: 11 } }, grid: { color: '#1a1a1a' } },
          y: { reverse: true, suggestedMin: 1, suggestedMax: 30, ticks: { color: '#aaa', font: { size: 11 }, callback: v => v + '위', padding: 6 }, grid: { color: '#1a1a1a' } }
        },
        plugins: {
          legend: {
            display: true,
            position: 'top',
            align: 'start',
            labels: { color: '#ccc', font: { size: 12 }, boxWidth: 12, padding: 15, usePointStyle: true }
          },
          tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + (ctx.parsed.y || '—') + '위' } }
        }
      }
    });
  }

  /* ── Steam Top5 ─────────────────────────────────────────────────── */
  const steamCanvas = document.getElementById('steamTop5TrendChart');
  if (steamCanvas && stsHist.length > 1) {
    steamCanvas.width = steamCanvas.parentElement.offsetWidth || 800;
    steamCanvas.height = 320;

    const labels = stsHist.map(h => new Date(h.timestamp));
    const colors = ['#4a9eff', '#f1c40f', '#2ecc71', '#e74c3c', '#ff4757'];

    const datasets = STEAM_TOP5.map((country, idx) => {
      const data = stsHist.map(h => {
        const r = h.results?.[country]?.rank ?? null;
        return r && r < 999 ? r : null;
      });
      return {
        label: `${STS_F[country] || FLAGS[country] || ''} ${country}`,
        data: data,
        borderColor: colors[idx],
        backgroundColor: 'rgba(255,255,255,0.06)',
        borderWidth: 2.5,
        tension: 0.25,
        spanGaps: true,
        pointRadius: 0,
        pointHoverRadius: 5
      };
    });

    if (steamTop5TrendCI) steamTop5TrendCI.destroy();
    steamTop5TrendCI = new Chart(steamCanvas.getContext('2d'), {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: false,
        animation: false,
        layout: { padding: { top: 10, right: 20 } },
        scales: {
          x: { type: 'time', time: { displayFormats: { day: 'M/d' } }, ticks: { color: '#aaa', maxTicksLimit: 10, font: { size: 11 } }, grid: { color: '#1a1a1a' } },
          y: { reverse: true, suggestedMin: 1, suggestedMax: 30, ticks: { color: '#aaa', font: { size: 11 }, callback: v => v + '위', padding: 6 }, grid: { color: '#1a1a1a' } }
        },
        plugins: {
          legend: {
            display: true,
            position: 'top',
            align: 'start',
            labels: { color: '#ccc', font: { size: 12 }, boxWidth: 12, padding: 15, usePointStyle: true }
          },
          tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + (ctx.parsed.y || '—') + '위' } }
        }
      }
    });
  }
}

/* (기존 renderSTS, loadSteamTopSellerData 등 모든 함수 그대로 유지 — Top5 차트는 renderSummaryCharts에서 자동 호출됨) */

/* 기존 init()에서 데이터 로드 후 차트가 정상 렌더되도록 이미 renderSummaryCharts가 호출됨 */

/* (나머지 전체 스크립트 — dispatch, sales, modal 등 — 그대로 유지) */
window.addEventListener('DOMContentLoaded', () => {
  /* 기존 초기화 코드 그대로 */
  init();
});
</script>

<!-- (기존 모든 모달, popover 등 그대로 유지) -->

<div id="ps-links-overlay" onclick="closePsLinksPopover()"></div>
<div class="ps-links-popover" id="ps-links-popover">

  <div class="ps-links-grid" id="ps-links-grid"></div>
</div>

</body>
