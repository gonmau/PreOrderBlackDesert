<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Crimson Desert — PS Store Global Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    :root {
      --bg: rgba(10,6,8,0.0);
      --surface: rgba(10,6,8,0.7);
      --surface2: rgba(20,10,14,0.5);
      --border: rgba(80,50,55,0.7);
      --red: #c0392b;
      --red-glow: #e74c3c;
      --text: #eee;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background: #000;
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      overflow-x: hidden; /* 가로 스크롤 방지 */
    }

    #bg-image-layer {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: url('https://image.api.playstation.com/vulcan/ap/rnd/202412/0310/240578873752e5052968366914df5a975734be8b64e52f5a.jpg') no-repeat center center / cover;
      opacity: 0.4; z-index: -1;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    header { text-align: center; margin-bottom: 30px; }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 8vw, 4rem); /* 화면 크기에 맞게 제목 크기 자동 조절 */
      margin: 0; color: #fff;
      text-shadow: 0 0 15px var(--red);
    }
    .subtitle { font-weight: 300; opacity: 0.8; letter-spacing: 2px; font-size: 0.9rem; }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px; border-radius: 8px; margin-bottom: 25px;
      backdrop-filter: blur(8px);
    }

    /* 차트 영역 반응형 */
    .chart-container {
      position: relative;
      height: 450px; /* 기본 높이 */
      width: 100%;
    }

    /* ⭐ 표 가로 잘림 방지: 스크롤 기능 추가 */
    .table-responsive {
      width: 100%;
      overflow-x: auto; /* 가로로 넘치면 스크롤 바 생성 */
      -webkit-overflow-scrolling: touch; /* iOS 부드러운 스크롤 */
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px; /* 모바일에서 표가 너무 찌그러지지 않게 최소 너비 고정 */
    }

    th, td {
      padding: 12px; text-align: center;
      border-bottom: 1px solid var(--border);
    }
    th { background: var(--surface2); font-weight: 700; font-size: 0.85rem; }
    td { font-size: 0.9rem; }

    /* 국가별 플래그/이름 정렬 */
    .country-cell { display: flex; align-items: center; justify-content: center; gap: 8px; }

    /* 출시 카운트다운 디자인 */
    .countdown-box {
      margin-top: 20px;
      padding: 15px;
      background: rgba(192, 57, 43, 0.15);
      border: 1px solid var(--red);
      border-radius: 10px;
    }
    .cd-flex { display: flex; justify-content: center; align-items: baseline; gap: 8px; }
    .cd-val { font-size: 1.8rem; font-weight: 700; color: #fff; }
    .cd-unit { font-size: 0.8rem; opacity: 0.8; margin-right: 5px; }

    /* 모바일 전용 스타일 */
    @media (max-width: 768px) {
      .container { padding: 10px; }
      .section { padding: 15px; }
      .chart-container { height: 350px; } /* 모바일에서 차트 높이 줄임 */
      .cd-val { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div id="bg-image-layer"></div>

<div class="container">
  <header>
    <h1>CRIMSON DESERT</h1>
    <div class="subtitle" id="page-subtitle">GLOBAL BESTSELLER TRACKER</div>
    
    <div id="countdown-area" class="countdown-box">
      </div>
  </header>

  <div class="section">
    <h2 style="font-size:1.1rem; margin-top:0;">Global Popularity Trend</h2>
    <div class="chart-container">
      <canvas id="mainChart"></canvas>
    </div>
  </div>

  <div class="section">
    <h2 style="font-size:1.1rem; margin-top:0;">Live Regional Rankings</h2>
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Region</th>
            <th>Country</th>
            <th>Current Rank</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="rank-data-body">
          </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // 차트 및 데이터 로드 스크립트
  // Chart.js 옵션에 반드시 아래 두 줄을 포함하세요.
  // responsive: true, 
  // maintainAspectRatio: false
  
  // (여기에 기존에 사용하시던 Chart.js 및 fetch 관련 자바스크립트 코드를 넣어주세요)
</script>

</body>
</html>
