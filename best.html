<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crimson Desert — Global Tracker (Synced)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@500;600;700&family=Noto+Color+Emoji&display=swap');

  :root {
    --blood: #ff4757; /* 더 밝은 레드 */
    --gold: #f1c40f;  /* 밝은 골드 */
    --dark: #000000;  /* 완전 블랙 배경 */
    --panel: #111111;
    --border: #444444;
    --text-main: #ffffff;
    --text-sub: #cccccc;
    --up: #2ecc71;
    --down: #ff4757;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--text-main);
    font-family: 'Rajdhani', 'Noto Color Emoji', sans-serif;
    font-size: 18px;
  }

  .container { max-width: 1300px; margin: 0 auto; padding: 30px 20px; }

  header { border-bottom: 3px solid var(--blood); padding-bottom: 20px; margin-bottom: 30px; }
  .logo h1 { font-family: 'Cinzel', serif; font-size: 42px; color: #fff; text-shadow: 0 0 20px rgba(255,71,87,0.6); }
  .logo h1 span { color: var(--blood); }
  #update-time { font-size: 18px; color: var(--gold); margin-top: 8px; font-weight: 700; }

  /* Summary Cards */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
  .card { background: var(--panel); border: 2px solid var(--border); padding: 30px; border-radius: 12px; position: relative; overflow: hidden; }
  .card::after { content: ''; position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: var(--blood); }
  .card .lbl { font-size: 15px; text-transform: uppercase; color: var(--text-sub); margin-bottom: 12px; font-weight: 800; letter-spacing: 1.5px; }
  .card .val { font-family: 'Cinzel', serif; font-size: 42px; color: var(--gold); text-shadow: 0 0 10px rgba(241,196,15,0.3); }

  /* Chart - 고가시성 */
  .chart-section { background: #080808; border: 2px solid var(--border); padding: 25px; margin-bottom: 30px; border-radius: 12px; }
  .chart-wrapper { height: 380px; width: 100%; }

  /* Table Controls */
  .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { 
    background: #222; border: 1px solid var(--border); color: #fff; 
    padding: 14px 24px; cursor: pointer; font-size: 17px; font-weight: 700; border-radius: 6px; transition: 0.2s;
  }
  .tab.active { background: var(--blood); border-color: var(--blood); box-shadow: 0 0 15px rgba(255,71,87,0.4); }

  /* Table Style */
  .table-wrapper { background: var(--panel); border: 2px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  th { 
    background: #1a1a1a; padding: 20px 15px; text-align: left; 
    font-size: 15px; font-weight: 900; color: var(--gold); border-bottom: 2px solid var(--border); text-transform: uppercase;
  }
  td { padding: 18px 15px; border-bottom: 1px solid #2a2a2a; font-size: 18px; font-weight: 600; }

  /* Rank & Change */
  .rank-box { 
    font-family: 'Cinzel', serif; font-weight: 900; display: inline-block; 
    width: 80px; text-align: center; border-radius: 6px; padding: 8px 0; font-size: 20px;
  }
  .flag { font-size: 24px; margin-right: 12px; vertical-align: middle; }
  .weight-val { color: var(--gold); font-weight: 700; }
  .trend-up { color: var(--up); font-weight: 800; }
  .trend-down { color: var(--down); font-weight: 800; }

  /* History Timeline */
  .history-list { display: flex; gap: 12px; overflow-x: auto; padding: 20px 0; }
  .history-btn { 
    background: #1a1a1a; border: 1px solid var(--border); padding: 14px 22px; 
    cursor: pointer; font-size: 15px; color: #fff; border-radius: 6px; font-weight: 700; white-space: nowrap;
  }
  .history-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(241,196,15,0.1); }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo"><h1><span>CRIMSON</span> DESERT</h1></div>
    <div id="update-time">데이터 로딩 중...</div>
  </header>

  <div class="stats">
    <div class="card"><div class="lbl">Global Weighted Avg</div><div class="val" id="stat-avg">—</div></div>
    <div class="card"><div class="lbl">Global Best Rank</div><div class="val" id="stat-best">—</div></div>
    <div class="card"><div class="lbl">Active Countries</div><div class="val" id="stat-count">—</div></div>
  </div>

  <div class="chart-section">
    <div class="chart-wrapper"><canvas id="trendChart"></canvas></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setRegion('all')">ALL REGIONS</button>
    <button class="tab" onclick="setRegion('Americas')">AMERICAS</button>
    <button class="tab" onclick="setRegion('Europe & Middle East')">EUROPE/ME</button>
    <button class="tab" onclick="setRegion('Asia & Oceania')">ASIA/OCEANIA</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th onclick="setSort('name')">Country</th>
          <th onclick="setSort('rank')">Current</th>
          <th onclick="setSort('prev')">Previous</th>
          <th onclick="setSort('change')">Trend</th>
          <th onclick="setSort('weight')">Weight</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <div class="history-list" id="history-btns"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

<script>
/** * index.html과 가중치 동기화
 * 명시된 국가 외에는 모두 1.0 부여
 */
const WEIGHTS = {
  "미국": 30.0, "영국": 8.5, "일본": 8.0, "독일": 6.5, "프랑스": 6.0,
  "캐나다": 4.5, "스페인": 4.0, "이탈리아": 3.5, "호주": 3.0, "한국": 2.8
};

const FLAGS = {"미국":"🇺🇸","캐나다":"🇨🇦","브라질":"🇧🇷","멕시코":"🇲🇽","영국":"🇬🇧","독일":"🇩🇪","프랑스":"🇫🇷","스페인":"🇪🇸","이탈리아":"🇮🇹","일본":"🇯🇵","한국":"🇰🇷","호주":"🇦🇺","아르헨티나":"🇦🇷","칠레":"🇨🇱","콜롬비아":"🇨🇴","페루":"🇵🇪","네덜란드":"🇳🇱","사우디아라비아":"🇸🇦","아랍에미리트":"🇦🇪","폴란드":"🇵🇱","대만":"🇹🇼","홍콩":"🇭🇰","태국":"🇹🇭","중국":"🇨🇳"};

const REGIONS = {
  "Americas": ["미국","캐나다","브라질","멕시코","아르헨티나","칠레","콜롬비아","페루","우루과이","볼리비아","과테말라","온두라스","코스타리카","에콰도르","엘살바도르","니카라과","파나마","파라과이"],
  "Europe & Middle East": ["영국","독일","프랑스","스페인","이탈리아","네덜란드","폴란드","스위스","스웨덴","노르웨이","덴마크","핀란드","포르투갈","그리스","체코","헝가리","루마니아","슬로바키아","슬로베니아","우크라이나","사우디아라비아","아랍에미리트","남아공","터키","벨기에","오스트리아","이스라엘","크로아티아","불가리아","키프로스","아이슬란드","아일랜드","쿠웨이트","레바논","룩셈부르크","몰타","오만","카타르","바레인"],
  "Asia & Oceania": ["일본","한국","중국","호주","인도","태국","싱가포르","말레이시아","인도네시아","필리핀","베트남","홍콩","대만","뉴질랜드"]
};

let historyData = [];
let currentIdx = -1;
let currentRegion = 'all';
let sortKey = 'rank';
let sortAsc = true;
let chartInstance = null;

async function init() {
  const res = await fetch('./bestseller_history.json?t=' + Date.now());
  historyData = await res.json();
  currentIdx = historyData.length - 1;
  renderAll();
}

function getRank(entry, country) {
  const r = entry.raw_results[country];
  if (r === undefined || r === null) return 999;
  return (typeof r === 'object') ? Math.min(...Object.values(r).filter(v => v !== null)) : r;
}

function renderAll() {
  const curr = historyData[currentIdx];
  const prev = currentIdx > 0 ? historyData[currentIdx - 1] : null;

  document.getElementById('update-time').innerText = `SNAPSHOT: ${curr.timestamp.split('.')[0].replace('T', ' ')}`;
  // index.html과 동일한 가중 평균 방식 표시
  document.getElementById('stat-avg').innerText = curr.averages.combined.toFixed(1) + '위';

  const list = [];
  let best = 999;

  for (const [region, names] of Object.entries(REGIONS)) {
    names.forEach(name => {
      const r = getRank(curr, name);
      const p = prev ? getRank(prev, name) : 999;
      if (r < best && r !== 999) best = r;
      // 가중치 없으면 1.0 (index.html 기준)
      list.push({ name, region, rank: r, prev: p, change: (p === 999 || r === 999) ? 0 : p - r, weight: WEIGHTS[name] || 1.0 });
    });
  }

  document.getElementById('stat-best').innerText = best === 999 ? '—' : best + '위';
  document.getElementById('stat-count').innerText = list.filter(x => x.rank < 999).length + '개국';

  let display = list.filter(x => currentRegion === 'all' || x.region === currentRegion);
  display.sort((a, b) => sortAsc ? (a[sortKey] > b[sortKey] ? 1 : -1) : (a[sortKey] < b[sortKey] ? 1 : -1));

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  display.forEach(d => {
    const opacity = d.rank >= 999 ? 0 : Math.max(0.2, 1 - (d.rank / 100));
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="flag">${FLAGS[d.name] || '🏳️'}</span>${d.name}</td>
      <td><span class="rank-box" style="background:rgba(255,71,87,${opacity}); color:#fff">${d.rank === 999 ? '—' : d.rank + '위'}</span></td>
      <td style="color:var(--text-sub);">${d.prev === 999 ? '—' : d.prev + '위'}</td>
      <td class="${d.change > 0 ? 'trend-up' : (d.change < 0 ? 'trend-down' : '')}">${d.change > 0 ? '▲'+d.change : (d.change < 0 ? '▼'+Math.abs(d.change) : '—')}</td>
      <td class="weight-val">${d.weight}</td>
    `;
    tbody.appendChild(tr);
  });

  renderChart();
  renderHistoryBtns();
}

function renderChart() {
  const ctx = document.getElementById('trendChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();

  const chartData = historyData.map(h => ({ x: new Date(h.timestamp.split('.')[0]), y: h.averages.combined }));

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        label: 'Global Weighted Avg',
        data: chartData,
        borderColor: '#f1c40f', 
        borderWidth: 6,         
        pointBackgroundColor: '#ff4757',
        pointRadius: 6,
        fill: false,
        tension: 0.1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { type: 'time', grid: { color: '#222' }, ticks: { color: '#fff', font: { size: 14, weight: 'bold' } } },
        y: { reverse: true, grid: { color: '#222' }, ticks: { color: '#fff', font: { size: 14, weight: 'bold' } } }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function renderHistoryBtns() {
  const container = document.getElementById('history-btns');
  container.innerHTML = '';
  historyData.forEach((h, i) => {
    const btn = document.createElement('div');
    btn.className = `history-btn ${i === currentIdx ? 'active' : ''}`;
    btn.innerText = h.timestamp.split('T')[1].substring(0, 5);
    btn.onclick = () => { currentIdx = i; renderAll(); };
    container.appendChild(btn);
  });
}

function setRegion(r) {
  currentRegion = r;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.includes(r==='all'?'ALL':r.substring(0,4).toUpperCase())));
  renderAll();
}

function setSort(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  renderAll();
}

init();
</script>
</body>
</html>
