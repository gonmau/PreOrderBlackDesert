<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crimson Desert — Global Heatmap & Trend</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap');

  :root {
    --blood: #ff4757; --gold: #f1c40f; --dark: #000000; --panel: #111111;
    --border: #333333; --text-main: #ffffff; --text-sub: #aaaaaa;
    --up: #2ecc71; --down: #ff4757;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text-main); font-family: 'Rajdhani', 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', 'Twemoji Mozilla', sans-serif; }
  .flag, .top10-item .n, .country-link .flag { font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', 'Twemoji Mozilla', sans-serif; font-style: normal; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

  header { border-bottom: 2px solid var(--blood); padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: flex-end; }
  .logo h1 { font-family: 'Cinzel', serif; font-size: 32px; color: #fff; }
  .logo h1 span { color: var(--blood); }
  #update-time { font-size: 14px; color: var(--gold); font-weight: 700; }

  /* Summary Grid */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 25px; }
  .card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 10px; border-left: 4px solid var(--blood); }
  .card .lbl { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; font-weight: 800; }
  .card .val { font-family: 'Cinzel', serif; font-size: 28px; color: var(--gold); }
  .card .sub { font-size: 14px; margin-top: 5px; color: #fff; }

  /* Top 10 Highlight Area */
  .top10-section { background: #0a0a0a; border: 1px solid var(--border); padding: 20px; border-radius: 10px; margin-bottom: 25px; }
  .top10-title { font-size: 16px; color: var(--gold); font-weight: 800; margin-bottom: 15px; text-transform: uppercase; }
  .top10-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
  .top10-item { background: #1a1a1a; padding: 10px; border-radius: 5px; text-align: center; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
  .top10-item:hover { border-color: var(--gold); background: #222; }
  .top10-item .n { font-size: 13px; color: var(--text-sub); display: block; }
  .top10-item .r { font-size: 18px; font-weight: 700; color: #fff; }

  /* Chart & Table */
  .chart-section { background: #080808; border: 1px solid var(--border); padding: 20px; margin-bottom: 25px; border-radius: 10px; height: 350px; }
  .table-wrapper { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  th { background: #1a1a1a; padding: 12px 10px; text-align: left; font-size: 12px; color: var(--gold); border-bottom: 1px solid var(--border); cursor: pointer; white-space: nowrap; }
  td { padding: 10px; border-bottom: 1px solid #222; font-size: 14px; }
  .td-mobile-meta { display: none; }

  /* 모바일 카드형 테이블 */
  @media (max-width: 640px) {
    .table-wrapper { overflow-x: unset; background: transparent; border: none; padding: 0; }
    table { min-width: unset; width: 100%; }
    thead { display: none; }
    tbody tr {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      gap: 2px 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      padding: 10px 12px;
    }
    td { display: block; border: none; padding: 0; }
    /* 국가명: 좌상단 */
    td:nth-child(1) { grid-column: 1; grid-row: 1; font-size: 14px; font-weight: 700; }
    /* 현재순위: 우측 전체 */
    td:nth-child(2) { grid-column: 2; grid-row: 1 / 3; display: flex; align-items: center; justify-content: flex-end; }
    td:nth-child(2) .rank-box { width: 52px; font-size: 14px; }
    /* PC 전용 컬럼 숨김 */
    .td-meta { display: none !important; }
    /* 모바일 메타 한 줄: 좌하단 */
    .td-mobile-meta {
      display: flex !important;
      grid-column: 1; grid-row: 2;
      gap: 8px; align-items: center; flex-wrap: wrap;
      margin-top: 3px;
    }
  }

  /* 링크 스타일 */
  .country-link { color: inherit; text-decoration: none; display: flex; align-items: center; }
  .country-link:hover { color: var(--gold); text-decoration: underline; }

  /* Modal (Pop-up Chart) */
  .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
  .modal-content { background: #111; width: 90%; max-width: 800px; padding: 30px; border-radius: 15px; border: 1px solid var(--gold); position: relative; }
  .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; color: #fff; cursor: pointer; }

  .rank-box { font-family: 'Cinzel', serif; font-weight: 900; display: inline-block; width: 60px; text-align: center; border-radius: 4px; padding: 4px 0; cursor: pointer; }
  .flag { font-size: 20px; margin-right: 8px; vertical-align: middle; font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif; }
  /* Twemoji img 태그 크기 통일 */
  img.emoji { height: 1.3em; width: 1.3em; vertical-align: -0.2em; margin-right: 6px; display: inline-block; }
  .top10-item img.emoji { height: 1.1em; width: 1.1em; margin-right: 3px; }
  /* CSV 다운로드 툴바 */
  .table-toolbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 8px;
  }
  .csv-btn {
    background: #1a1a1a;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .csv-btn:hover { background: rgba(241,196,15,0.15); }

  /* 모바일 반응형 */
  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .chart-section { height: 220px; }
    .table-toolbar { margin-bottom: 6px; }
    .csv-btn { font-size: 12px; padding: 6px 10px; }
    .top10-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
    .schedule-grid { grid-template-columns: repeat(auto-fill, minmax(76px, 1fr)); }
  }

  .trend-down { color: #ff4757; font-weight: 700; letter-spacing: 2px; }
  .trend-arrow { margin-right: 4px; }

  /* Schedule Tracker */
  .schedule-section {
    background: #0a0a0a;
    border: 1px solid var(--border);
    padding: 18px 20px;
    border-radius: 10px;
    margin-bottom: 25px;
  }
  .schedule-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .schedule-title {
    font-size: 16px;
    color: var(--gold);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .schedule-legend {
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: var(--text-sub);
  }
  .schedule-legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block;
  }
  .legend-ok   { background: #2ecc71; }
  .legend-miss { background: #444; border: 1px solid #666; }
  .legend-fut  { background: #1a1a1a; border: 1px dashed #555; }

  .schedule-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
    gap: 8px;
  }
  .sched-day {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 7px;
    padding: 10px 8px 8px;
    text-align: center;
    min-width: 0;
  }
  .sched-day.today {
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(241,196,15,0.15);
  }
  .sched-date {
    font-size: 11px;
    color: var(--text-sub);
    margin-bottom: 6px;
    font-weight: 700;
    white-space: nowrap;
  }
  .sched-day.today .sched-date { color: var(--gold); }
  .sched-slots {
    display: flex;
    gap: 5px;
    justify-content: center;
  }
  .sched-slot {
    flex: 1;
    border-radius: 4px;
    padding: 5px 2px 4px;
    font-size: 10px;
    font-weight: 700;
    line-height: 1.3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 0;
  }
  .sched-slot .slot-label {
    font-size: 9px;
    opacity: 0.7;
    letter-spacing: 0.3px;
    color: #888;
  }
  .sched-slot .slot-time {
    font-size: 10px;
    font-weight: 800;
  }
  .slot-ok   { background: rgba(46,204,113,0.15); border: 1px solid rgba(46,204,113,0.4); color: #2ecc71; }
  .slot-miss { background: rgba(255,71,87,0.08);  border: 1px solid rgba(255,71,87,0.25);  color: #666; }
  .slot-fut  { background: #1a1a1a; border: 1px dashed #333; color: #444; }
  .slot-icon { font-size: 13px; line-height: 1; }

  .schedule-summary {
    margin-top: 12px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--text-sub);
    border-top: 1px solid #1e1e1e;
    padding-top: 10px;
  }
  .sched-stat { display: flex; flex-direction: column; gap: 2px; }
  .sched-stat .sv { font-size: 18px; font-family: 'Cinzel', serif; color: #fff; }
  .sched-stat .sl { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
  .next-run-badge {
    margin-left: auto;
    background: rgba(241,196,15,0.1);
    border: 1px solid rgba(241,196,15,0.3);
    border-radius: 5px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--gold);
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .pulse-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gold);
    display: inline-block;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
</style>
</head>

<div class="container">
  <header>
    <div class="logo"><h1><span>CRIMSON</span> DESERT</h1></div>
    <div id="update-time">—</div>
  </header>

  <div class="stats">
    <div class="card"><div class="lbl">Weighted Average</div><div class="val" id="stat-avg">—</div></div>
    <div class="card">
      <div class="lbl">Best Rank</div>
      <div class="val" id="stat-best-val">—</div>
      <div class="sub" id="stat-best-name">...</div>
    </div>
    <div class="card">
      <div class="lbl">Worst Rank</div>
      <div class="val" id="stat-worst-val">—</div>
      <div class="sub" id="stat-worst-name">...</div>
    </div>
    <div class="card"><div class="lbl">Active Countries</div><div class="val" id="stat-count">—</div></div>
  </div>

  <div class="top10-section">
    <div class="top10-title">Market Leaders (Top 10 Weight) - Click for History</div>
    <div class="top10-grid" id="top10-grid"></div>
  </div>

  <!-- Schedule Tracker -->
  <div class="schedule-section">
    <div class="schedule-header">
      <div class="schedule-title">⏱ Tracker Schedule</div>
      <div class="schedule-legend">
        <span><i class="legend-dot legend-ok"></i> 실행됨</span>
        <span><i class="legend-dot legend-miss"></i> 누락</span>
        <span><i class="legend-dot legend-fut"></i> 예정</span>
      </div>
    </div>
    <div class="schedule-grid" id="schedule-grid"></div>
    <div class="schedule-summary" id="schedule-summary"></div>
  </div>

  <div class="chart-section"><canvas id="mainChart"></canvas></div>

  <div class="table-toolbar">
    <button class="csv-btn" onclick="downloadCSV()">📥 CSV 다운로드 (현재순위 정렬)</button>
  </div>

  <div class="table-wrapper">
    <table>

          <th onclick="setSort('best')" class="td-meta">Best Rank</th>
          <th onclick="setSort('avg')" class="td-meta">Avg Rank</th>
          <th onclick="setSort('change')" class="td-meta">Trend</th>
          <th onclick="setSort('weight')" class="td-meta">Weight ↓</th>
          <th class="td-mobile-meta" style="display:none;"></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<div id="chartModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>

    <div style="height:400px;"><canvas id="countryChart"></canvas></div>
  </div>
</div>

  "일본":"🇯🇵","한국":"🇰🇷","중국":"🇨🇳","호주":"🇦🇺",
  "인도":"🇮🇳","태국":"🇹🇭","싱가포르":"🇸🇬","말레이시아":"🇲🇾",
  "인도네시아":"🇮🇩","필리핀":"🇵🇭","베트남":"🇻🇳",
  "홍콩":"🇭🇰","대만":"🇹🇼","뉴질랜드":"🇳🇿"
};

let historyData = [];
let scheduleSlots = [  // fallback (JSON에 schedule 없을 시 사용)
  { hour: 6,  label: 'AM' },
  { hour: 18, label: 'PM' },
];
// 기본 정렬을 현재순위(rank) 기준으로, 오름차순(true) 설정
let sortKey = 'rank'; let sortAsc = true; 
let mainChart = null; let countryChart = null;

async function init() {
  const res = await fetch('./bestseller_history.json?t=' + Date.now());
  const payload = await res.json();

  // 신규 포맷: {"schedule": {...}, "history": [...]}
  // 구버전 포맷: 리스트 그대로
  if (Array.isArray(payload)) {
    historyData = payload;
  } else {
    historyData = payload.history || [];
    // schedule.slots_kst 가 있으면 하드코딩 대신 사용
    if (payload.schedule && Array.isArray(payload.schedule.slots_kst)) {
      scheduleSlots = payload.schedule.slots_kst.map(h => ({
        hour: h,
        label: h < 12 ? 'AM' : 'PM'
      }));
      window._scheduleCron = payload.schedule.cron || '';
      console.log('[Schedule] yml에서 로드:', payload.schedule.cron, '→ KST slots:', payload.schedule.slots_kst);
    }
  }

  render();
}

function getRank(entry, country) {
  const r = entry.raw_results[country];
  if (r === undefined || r === null) return 999;
  return (typeof r === 'object') ? Math.min(...Object.values(r).filter(v => v !== null)) : r;
}

function getStoreUrl(name) {
  const locale = COUNTRY_LOCALE[name];
  if (!locale) return "https://store.playstation.com/";
  return `https://store.playstation.com/${locale}/pages/browse/1?conceptId=10002363`;
}

function render() {
  const curr = historyData[historyData.length - 1];
  const prev = historyData.length > 1 ? historyData[historyData.length - 2] : null;

  document.getElementById('update-time').innerText = `LAST SNAPSHOT: ${curr.timestamp.split('.')[0].replace('T', ' ')}`;
  document.getElementById('stat-avg').innerText = curr.averages.combined.toFixed(1) + '위';

  let list = [];
  let best = { r: 999, n: '' }; let worst = { r: 0, n: '' };

  // 국가별 best/avg 계산
  const countryBest = {}; const countryAvg = {};
  Object.keys(curr.raw_results).forEach(name => {
    const allRanks = historyData.map(h => getRank(h, name)).filter(r => r !== 999);
    countryBest[name] = allRanks.length > 0 ? Math.min(...allRanks) : 999;
    countryAvg[name] = allRanks.length > 0 ? (allRanks.reduce((a,b)=>a+b,0) / allRanks.length) : 999;
  });

  Object.keys(curr.raw_results).forEach(name => {
    const r = getRank(curr, name);
    const p = prev ? getRank(prev, name) : 999;
    if (r !== 999) {
      if (r < best.r) best = { r, n: name };
      if (r > worst.r && r < 999) worst = { r, n: name };
    }
    list.push({ name, rank: r, change: (p === 999 || r === 999) ? 0 : p - r, weight: WEIGHTS[name] || 1.0, best: countryBest[name], avg: countryAvg[name] });
  });

  document.getElementById('stat-best-val').innerText = best.r + '위';
  document.getElementById('stat-best-name').innerText = (FLAGS[best.n] || '') + ' ' + best.n;
  document.getElementById('stat-worst-val').innerText = worst.r === 0 ? '—' : worst.r + '위';
  document.getElementById('stat-worst-name').innerText = worst.n ? (FLAGS[worst.n] || '') + ' ' + worst.n : '...';
  document.getElementById('stat-count').innerText = list.filter(x => x.rank < 999).length + '개국';

  const t10Grid = document.getElementById('top10-grid');
  t10Grid.innerHTML = '';
  Object.keys(WEIGHTS).forEach(name => {
    const r = getRank(curr, name);
    const div = document.createElement('div');
    div.className = 'top10-item';
    div.onclick = () => showCountryChart(name);
    div.innerHTML = `<span class="n">${FLAGS[name] || ''} ${name}</span><span class="r">${r === 999 ? '—' : r + '위'}</span>`;
    t10Grid.appendChild(div);
  });

  // 정렬 로직 (rank/best/avg에서 999는 항상 마지막)
  list.sort((a, b) => {
    const av = a[sortKey] === 999 ? (sortAsc ? 99999 : -99999) : a[sortKey];
    const bv = b[sortKey] === 999 ? (sortAsc ? 99999 : -99999) : b[sortKey];
    return sortAsc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
  });
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  list.forEach(d => {
    const tr = document.createElement('tr');
    const opacity = d.rank >= 999 ? 0 : Math.max(0.2, 1 - (d.rank / 120));
    const bestStr = d.best === 999 ? '—' : d.best + '위';
    const avgStr  = d.avg  === 999 ? '—' : d.avg.toFixed(1) + '위';
    const trendStr = d.change > 0
      ? `<span class="trend-up">▲${d.change}</span>`
      : (d.change < 0 ? `<span class="trend-down">▼${Math.abs(d.change)}</span>` : '—');
    tr.innerHTML = `
      <td>
        <a href="${getStoreUrl(d.name)}" target="_blank" class="country-link">
          <span class="flag">${FLAGS[d.name] || '🏳️'}</span>${d.name} 🔗
        </a>
      </td>
      <td>
        <span class="rank-box" style="background:rgba(255,71,87,${opacity}); color:#fff" onclick="showCountryChart('${d.name}')">
          ${d.rank === 999 ? '—' : d.rank + '위'}
        </span>
      </td>
      <td class="td-meta" style="color:#f1c40f; font-weight:700;">${bestStr}</td>
      <td class="td-meta" style="color:#aaaaaa; font-weight:600;">${avgStr}</td>
      <td class="td-meta ${d.change > 0 ? 'trend-up' : (d.change < 0 ? 'trend-down' : '')}">${trendStr}</td>
      <td class="td-meta" style="color:var(--gold); font-weight:bold;">${d.weight}</td>
      <td class="td-mobile-meta">
        <span style="color:#f1c40f;font-size:11px;font-weight:700;">최고 ${bestStr}</span>
        <span style="color:#aaa;font-size:11px;">평균 ${avgStr}</span>
        ${trendStr !== '—' ? `<span style="font-size:11px;">${trendStr}</span>` : ''}
        <span style="color:#888;font-size:11px;">W:${d.weight}</span>
      </td>
    `;
    tbody.appendChild(tr);
  });

  renderMainChart();
  renderSchedule();

  // 모든 이모지를 Twemoji 이미지로 변환 (PC/모바일 크로스 플랫폼)
  twemoji.parse(document.body, { folder: 'svg', ext: '.svg' });
}

function renderMainChart() {
  const ctx = document.getElementById('mainChart').getContext('2d');
  if (mainChart) mainChart.destroy();
  mainChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        label: 'Global Weighted Avg',
        data: historyData.map(h => ({ x: new Date(h.timestamp.split('.')[0]), y: h.averages.combined })),
        borderColor: '#f1c40f', borderWidth: 2, pointRadius: 2, pointHoverRadius: 5, tension: 0.2, fill: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: {
          type: 'time',
          time: {
            tooltipFormat: 'MM/dd HH:mm',
            displayFormats: { hour: 'MM/dd HH:mm', day: 'MM/dd' }
          },
          grid: { color: '#222' },
          ticks: {
            color: '#fff',
            maxRotation: 45,
            autoSkip: true,
            maxTicksLimit: 12
          }
        },
        y: { reverse: true, grid: { color: '#222' }, ticks: { color: '#fff' } }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function showCountryChart(countryName) {
  document.getElementById('chartModal').style.display = 'flex';
  document.getElementById('modalTitle').innerText = `${FLAGS[countryName] || ''} ${countryName} History`;
  twemoji.parse(document.getElementById('modalTitle'), { folder: 'svg', ext: '.svg' });
  const ctx = document.getElementById('countryChart').getContext('2d');
  if (countryChart) countryChart.destroy();
  const countryData = historyData.map(h => ({ x: new Date(h.timestamp.split('.')[0]), y: getRank(h, countryName) })).filter(d => d.y !== 999);
  countryChart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [{
        label: countryName,
        data: countryData,
        borderColor: '#ff4757', borderWidth: 2, pointRadius: 2, pointHoverRadius: 5, tension: 0.2, fill: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: {
          type: 'time',
          time: {
            tooltipFormat: 'MM/dd HH:mm',
            displayFormats: { hour: 'MM/dd HH:mm', day: 'MM/dd' }
          },
          grid: { color: '#333' },
          ticks: { color: '#fff', maxRotation: 45, autoSkip: true, maxTicksLimit: 10 }
        },
        y: { reverse: true, min: 1, grid: { color: '#333' }, ticks: { color: '#fff' } }
      }
    }
  });
}

function closeModal() { document.getElementById('chartModal').style.display = 'none'; }

function setSort(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = (key === 'weight' ? false : true); }
  render();
}

function downloadCSV() {
  const curr = historyData[historyData.length - 1];

  // 국가별 best/avg 재계산
  const rows = [];
  Object.keys(curr.raw_results).forEach(name => {
    const r = getRank(curr, name);
    const allRanks = historyData.map(h => getRank(h, name)).filter(v => v !== 999);
    const bestR = allRanks.length > 0 ? Math.min(...allRanks) : null;
    const avgR = allRanks.length > 0 ? (allRanks.reduce((a,b)=>a+b,0)/allRanks.length) : null;
    rows.push({ name, rank: r, best: bestR, avg: avgR, url: getStoreUrl(name) });
  });

  // 현재 순위 오름차순 정렬 (999 = 마지막)
  rows.sort((a, b) => {
    const ar = a.rank === 999 ? 9999 : a.rank;
    const br = b.rank === 999 ? 9999 : b.rank;
    return ar - br;
  });

  const header = ['Country', 'Current Rank', 'Best Rank', 'Avg Rank', 'PS Store URL'];
  const csvLines = [header.join(',')];
  rows.forEach(r => {
    csvLines.push([
      r.name,
      r.rank === 999 ? '' : r.rank,
      r.best !== null ? r.best : '',
      r.avg !== null ? r.avg.toFixed(1) : '',
      r.url
    ].map(v => `"${v}"`).join(','));
  });

  const blob = new Blob(['\uFEFF' + csvLines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const ts = curr.timestamp.split('.')[0].replace(/[-:T]/g, '').slice(0,12);
  a.download = `crimson_desert_ranks_${ts}.csv`;
  a.click();
}

/* ── Schedule Tracker ─────────────────────────────────────────────── */
// cron은 yml 기준. Python이 파싱해서 JSON에 저장 → scheduleSlots로 로드됨.
// JSON에 schedule 키가 없을 경우 위 fallback 값(06:00/18:00)이 사용됨.
const TOLERANCE_MIN = 90; // ±90분 허용

function renderSchedule() {
  // KST 기준 현재 시각
  const nowUtc = new Date();
  const kstOffset = 9 * 60 * 60 * 1000;
  const nowKst = new Date(nowUtc.getTime() + kstOffset);

  // JSON에서 모든 타임스탬프 파싱 (KST 변환)
  const stamps = historyData.map(h => {
    const d = new Date(h.timestamp);
    return new Date(d.getTime()); // ISO 문자열에 +09:00 포함됨
  });

  // 최근 8일 날짜 생성 (KST 기준 오늘 포함)
  const todayKst = new Date(nowKst);
  todayKst.setUTCHours(0, 0, 0, 0);

  const days = [];
  for (let i = 7; i >= 0; i--) {
    const d = new Date(todayKst.getTime() - i * 86400000);
    days.push(d);
  }

  // 날짜+슬롯별 실행 여부 판단
  function checkSlot(dayUtcMidnight, slotHourKst) {
    // 슬롯의 KST 시각 → UTC로
    const slotKstMs = dayUtcMidnight.getTime() + (slotHourKst - 9) * 3600000; // UTC equiv
    const now = nowUtc.getTime();
    if (slotKstMs > now + TOLERANCE_MIN * 60000) return 'future';
    // tolerance 범위 내 타임스탬프 존재 여부
    const found = stamps.find(s => Math.abs(s.getTime() - slotKstMs) <= TOLERANCE_MIN * 60000);
    if (found) {
      // 실제 실행 KST 시간 반환
      const kst = new Date(found.getTime() + kstOffset);
      return `${String(kst.getUTCHours()).padStart(2,'0')}:${String(kst.getUTCMinutes()).padStart(2,'0')}`;
    }
    return 'miss';
  }

  const grid = document.getElementById('schedule-grid');
  grid.innerHTML = '';

  // 타이틀에 cron 표현식 반영
  const titleEl = document.querySelector('.schedule-title');
  if (titleEl) {
    const cronStr = (typeof payload !== 'undefined' && window._scheduleCron) ? ` <span style="color:#555;font-size:11px;font-weight:400">${window._scheduleCron}</span>` : '';
    titleEl.innerHTML = `⏱ Tracker Schedule${cronStr}`;
  }
  let totalSlots = 0, okSlots = 0, missSlots = 0;

  const dayNames = ['일','월','화','수','목','금','토'];
  days.forEach(day => {
    const isToday = (day.getTime() === todayKst.getTime());
    const kstDay = new Date(day.getTime() + kstOffset);
    const mm = kstDay.getUTCMonth() + 1;
    const dd = kstDay.getUTCDate();
    const dow = dayNames[kstDay.getUTCDay()];

    const div = document.createElement('div');
    div.className = 'sched-day' + (isToday ? ' today' : '');

    let slotsHtml = '';
    scheduleSlots.forEach(({ hour, label }) => {
      const result = checkSlot(day, hour);
      if (result === 'future') {
        slotsHtml += `<div class="sched-slot slot-fut">
          <span class="slot-label">${label}</span>
          <span class="slot-icon">·</span>
          <span class="slot-time" style="color:#333">${String(hour).padStart(2,'0')}:00</span>
        </div>`;
      } else if (result === 'miss') {
        missSlots++; totalSlots++;
        slotsHtml += `<div class="sched-slot slot-miss" title="${mm}/${dd} ${label} — 누락">
          <span class="slot-label">${label}</span>
          <span class="slot-icon">✗</span>
          <span class="slot-time">—</span>
        </div>`;
      } else {
        okSlots++; totalSlots++;
        slotsHtml += `<div class="sched-slot slot-ok" title="${mm}/${dd} ${label} — ${result} 실행">
          <span class="slot-label">${label}</span>
          <span class="slot-icon">✓</span>
          <span class="slot-time">${result}</span>
        </div>`;
      }
    });

    div.innerHTML = `<div class="sched-date">${mm}/${dd} <span style="color:#555">${dow}</span></div>
      <div class="sched-slots">${slotsHtml}</div>`;
    grid.appendChild(div);
  });

  // 다음 실행 시각 계산
  function getNextRun() {
    const nowKstH = nowKst.getUTCHours();
    const nowKstM = nowKst.getUTCMinutes();
    const nowMin = nowKstH * 60 + nowKstM;
    const slotMins = scheduleSlots.map(s => s.hour * 60);
    let nextMin = slotMins.find(m => m > nowMin);
    let nextLabel;
    if (nextMin !== undefined) {
      nextLabel = `오늘 ${String(Math.floor(nextMin/60)).padStart(2,'0')}:00 KST`;
    } else {
      nextLabel = `내일 ${String(scheduleSlots[0].hour).padStart(2,'0')}:00 KST`;
    }
    return nextLabel;
  }

  const rate = totalSlots > 0 ? Math.round(okSlots / totalSlots * 100) : 100;
  const summary = document.getElementById('schedule-summary');
  summary.innerHTML = `
    <div class="sched-stat"><span class="sv">${okSlots}</span><span class="sl">실행 완료</span></div>
    <div class="sched-stat"><span class="sv" style="color:${missSlots>0?'#ff4757':'#2ecc71'}">${missSlots}</span><span class="sl">누락</span></div>
    <div class="sched-stat"><span class="sv">${rate}%</span><span class="sl">성공률 (8일)</span></div>
    <div class="next-run-badge"><span class="pulse-dot"></span>다음 실행: ${getNextRun()}</div>
  `;
}
/* ───────────────────────────────────────────────────────────────────── */

init();
</script>
